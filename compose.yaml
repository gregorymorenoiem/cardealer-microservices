  # ──────────────────────────────────────────────────────────────────────
  # 📚 API DOCS SERVICE
  # ──────────────────────────────────────────────────────────────────────

  gateway:
    profiles: [core]
    build:
      context: ./backend
      dockerfile: Gateway/Gateway.Api/Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      Jwt__Key: "${JWT__KEY:-clave-super-secreta-desarrollo-32-caracteres-aaa}"
      Jwt__Issuer: "AuthService-Dev"
      Jwt__Audience: "OKLA-Dev"
      Redis__Host: "redis:6379"
      Redis__Connection: "redis:6379"
      RateLimiting__Enabled: "true"
      RateLimiting__DefaultLimit: "100"
      RateLimiting__DefaultWindowSeconds: "60"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__User: "guest"
      RabbitMQ__Password: "guest"
      Consul__Host: "http://consul:8500"
      # FASE 2: Observability
      Logging__Seq__ServerUrl: "http://seq:80"
      Observability__Otlp__Endpoint: "http://jaeger:4317"
      Observability__SamplingRatio: "1.0"
      Observability__Prometheus__Enabled: "true"
      ErrorHandling__PublishToErrorService: "true"
    ports:
      - "18443:80"
    depends_on:
      # Infra (hard deps — always available)
      redis:
        condition: service_healthy
      seq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      # Core services — soft dependency (gateway retries via Ocelot circuit-breaker)
      authservice:
        condition: service_started
      userservice:
        condition: service_started
      # vehicles profile (optional — gateway routes will fail gracefully if not up)
      # vehiclessaleservice, mediaservice, contactservice — not required at startup
      # business profile (optional)
      # adminservice — not required at startup
    networks:
      - okla-net
    volumes:
      - ./backend/Gateway:/app/Gateway
      - ./backend/_Shared/CarDealer.Contracts:/app/_Shared/CarDealer.Contracts
      - ./backend/_Shared/CarDealer.Shared:/app/_Shared/CarDealer.Shared
      - ./backend/_Shared/CarDealer.Shared.Logging:/app/_Shared/CarDealer.Shared.Logging
      - ./backend/_Shared/CarDealer.Shared.ErrorHandling:/app/_Shared/CarDealer.Shared.ErrorHandling
      - ./backend/_Shared/CarDealer.Shared.Observability:/app/_Shared/CarDealer.Shared.Observability
      - ./backend/_Shared/CarDealer.Shared.RateLimiting:/app/_Shared/CarDealer.Shared.RateLimiting
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:80/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────────────────────────────
  # 🔒 COMPLIANCE & LEGAL SERVICES
  # ──────────────────────────────────────────────────────────────────────

  # KYCService - Puerto 15180 (Know Your Customer - Verificación de Identidad)
  kycservice:
    profiles: [business]
    build:
      context: ./backend
      dockerfile: KYCService/KYCService.Api/Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      DATABASE_HOST: "postgres_db"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "kycdb"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "password"
      ConnectionStrings__DefaultConnection: "Host=postgres_db;Port=5432;Database=kycdb;Username=postgres;Password=password;Pooling=true;Minimum Pool Size=1;Maximum Pool Size=10"
      Jwt__Key: "${JWT__KEY:-clave-super-secreta-desarrollo-32-caracteres-aaa}"
      Jwt__Issuer: "AuthService-Dev"
      Jwt__Audience: "OKLA-Dev"
      Redis__Host: "redis:6379"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      Services__ConfigurationService: "http://host.docker.internal:15124"
      # Amazon Rekognition - Usa credenciales de ~/.aws montado como volumen
      FaceComparison__UseSimulation: "false"
      FaceComparison__UseAmazonRekognition: "true"
      AmazonRekognition__Region: "us-east-2"
    volumes:
      - ~/.aws:/root/.aws:ro
    ports:
      - "15180:80"
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - okla-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:80/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ComplianceService - Puerto 15151 (Cumplimiento Regulatorio General)
  spyneintegrationservice:
    profiles: [business]
    build:
      context: ./backend
      dockerfile: SpyneIntegrationService/SpyneIntegrationService.Api/Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      DATABASE_HOST: "postgres_db"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "spyneintegrationservice"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "password"
      ConnectionStrings__DefaultConnection: "Host=postgres_db;Port=5432;Database=spyneintegrationservice;Username=postgres;Password=password;Pooling=true;Minimum Pool Size=1;Maximum Pool Size=10"
      Jwt__Key: "${JWT__KEY:-clave-super-secreta-desarrollo-32-caracteres-aaa}"
      Jwt__Issuer: "AuthService-Dev"
      Jwt__Audience: "OKLA-Dev"
      Redis__Host: "redis:6379"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
    ports:
      - "15158:80"
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - okla-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:80/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ────────────────────────────────────────────────────────────────────
  # 📦 FASE 4 CONSOLIDADOS: RegulatoryAlertService, ComplianceIntegrationService
  #    → Absorbidos en ComplianceService
  # ────────────────────────────────────────────────────────────────────

  # ReportingService - Puerto 15161 (Reportes Generales)
  frontend-web:
    profiles: [frontend]
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          memory: 1G
    ports:
      - "3000:5173" # Vite dev server
    volumes:
      - ./frontend/web/src:/app/src
      - ./frontend/web/public:/app/public
    depends_on:
      gateway:
        condition: service_healthy
      authservice:
        condition: service_healthy
    networks:
      - okla-net
    environment:
      - NODE_OPTIONS=--max-old-space-size=1536
      - VITE_API_URL=http://localhost:18443
      - VITE_AUTH_SERVICE_URL=http://localhost:15085/api
      - VITE_GOOGLE_MAPS_KEY=${GOOGLE_MAPS_API_KEY:-}
      - VITE_PRODUCT_SERVICE_URL=http://localhost:15006/api
      - VITE_MEDIA_SERVICE_URL=http://localhost:15090/api
      - VITE_USE_MOCK_AUTH=false
      - VITE_ENABLE_MSW=false
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-your-google-client-id}
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:5173'', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────────────────────────
  # 🌐 FRONTEND WEB-NEXT (Next.js 16 Rebuild)
  # ──────────────────────────────────────────────────────────────────────

  frontend-next:
    profiles: [frontend]
    build:
      context: ./frontend/web-next
      dockerfile: Dockerfile.dev # Development mode with hot reload
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          memory: 1G
    ports:
      - "3000:3000" # Next.js dev server on port 3000
    volumes:
      # Mount source code for hot reload
      - ./frontend/web-next/src:/app/src:delegated
      - ./frontend/web-next/public:/app/public:delegated
      - ./frontend/web-next/next.config.ts:/app/next.config.ts:delegated
      - ./frontend/web-next/tailwind.config.ts:/app/tailwind.config.ts:delegated
      - ./frontend/web-next/tsconfig.json:/app/tsconfig.json:delegated
      # Exclude node_modules and .next from host (use container's)
      - /app/node_modules
      - /app/.next
    depends_on:
      gateway:
        condition: service_healthy
      postgres_db:
        condition: service_healthy
    networks:
      - okla-net
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:18443
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - INTERNAL_API_URL=http://gateway:80
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ──────────────────────────────────────────────────────────────────────
  # 🔒 TLS / REVERSE PROXY (equivalente al nginx ingress de K8s)
  # ──────────────────────────────────────────────────────────────────────

  # Caddy — HTTPS local con mkcert + proxy inverso
  # Replica: Browser → https://okla.local → Caddy → Frontend/Gateway
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 64M
        reservations:
          memory: 32M
    ports:
      - "443:443" # HTTPS — https://okla.local
      - "80:80" # HTTP  — para cloudflared tunnel
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/certs:/etc/caddy/certs:ro
    environment:
      FRONTEND_UPSTREAM: "${FRONTEND_UPSTREAM:-host.docker.internal:3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - okla-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://localhost:80/proxy/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Cloudflared — Túnel público temporal (dominio gratuito *.trycloudflare.com)
  # SOLO usar cuando necesites: webhooks, OAuth callbacks, testing desde móvil
  # Inicio: docker compose --profile tunnel up -d cloudflared
  # Ver URL: docker compose logs cloudflared | grep "trycloudflare.com"
  cloudflared:
    profiles: [tunnel]
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 64M
        reservations:
          memory: 32M
    command: tunnel --no-autoupdate --url http://caddy:80
    depends_on:
      caddy:
        condition: service_healthy
    networks:
      - okla-net
    restart: unless-stopped

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  okla-net:
    driver: bridge

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  consul_data:
  pg_backup_data:
  # FASE 2: Observability volumes
  seq_data:
