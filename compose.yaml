# ============================================================================
# COMPOSE.YAML - STACK LOCAL CON PERFILES POR TIERS
# ============================================================================
#
# ════════════════════════════════════════════════════════════════════════════
# PROFILES (tiers de arranque — sube solo lo que necesitas)
# ════════════════════════════════════════════════════════════════════════════
#
# PERFIL       SERVICIOS                                RAM     ACUM.
# ─────────────────────────────────────────────────────────────────────
# (ninguno)    infra: postgres+redis+rabbitmq+consul    ~2.4 GB  2.4 GB
#              + seq + jaeger (observabilidad siempre)
# core         gateway + authservice + userservice       ~3.2 GB  5.6 GB
#              + roleservice + errorservice
# vehicles     vehiclessaleservice + mediaservice        ~2.3 GB  7.9 GB
#              + contactservice + notificationservice
# ai           vehicleintelligenceservice + chatbot      ~2.3 GB  10.1 GB
#              + recommendationservice + dealeranalytics
# business     billingservice + crmservice + adminservice~3.1 GB  13.2 GB
#              + reviewservice + auditservice + reports
#              + comparison + kyc + azulpayment + spyne
# frontend     frontend-web (Vite) + frontend-next       ~4.0 GB  17.2 GB
# backup       pg-backup (opcional, no usar localmente)
#
# ════════════════════════════════════════════════════════════════════════════
# COMANDOS RÁPIDOS
# ════════════════════════════════════════════════════════════════════════════
#
# Solo infraestructura (~2.4 GB):
#   docker compose up -d
#
# Desarrollo backend de auth/users (~5.6 GB):
#   docker compose --profile core up -d
#
# Desarrollo de vehículos/marketplace (~7.9 GB):
#   docker compose --profile core --profile vehicles up -d
#
# Con IA/chatbot (~10.1 GB):
#   docker compose --profile core --profile vehicles --profile ai up -d
#
# Stack completo sin frontend (~13.2 GB):
#   docker compose --profile core --profile vehicles --profile ai --profile business up -d
#
# Stack completo (~17.2 GB) — requiere Docker Desktop ≥ 18 GB:
#   docker compose --profile core --profile vehicles --profile ai --profile business --profile frontend up -d
#
# UIs DE OBSERVABILIDAD (siempre disponibles):
#   - Seq (Logs):        http://localhost:5341
#   - Jaeger (Tracing):  http://localhost:16686
#   - RabbitMQ UI:       http://localhost:15672
#   - Consul UI:         http://localhost:8500
#   - PgBouncer:         http://localhost:6432
#
# IMPORTANTE: Docker Desktop debe tener ≥ 16 GB para el stack full.
# Ajustar en Docker Desktop → Settings → Resources → Memory
#
# OPTIMIZACIONES DE ARRANQUE LOCAL
# ────────────────────────────────────────────────────────────────────────────
# • Healthcheck interval: 10s (vs 30s default) — detecta healthy services 3x más rápido
# • start_period: 20s para microservicios (vs 40s) — falla rápido si no compila
# • start_period: 120s para vehiclessaleservice (dotnet watch run es lento la 1ra vez)
# • Paralelismo: Docker Compose levanta perfiles en paralelo automáticamente
#   Para más paralelismo: export COMPOSE_PARALLEL_LIMIT=10
# ============================================================================

# ═══════════════════════════════════════════════════════════════════════════
# EXTENSION FIELDS — Configuraciones compartidas (YAML anchors)
# Uso: <<: *deploy-api  /  <<: *deploy-heavy  /  <<: *healthcheck-api
# ═══════════════════════════════════════════════════════════════════════════
x-deploy-api: &deploy-api
  resources:
    limits:
      cpus: "0.5"
      memory: 384M
    reservations:
      memory: 256M

x-deploy-std: &deploy-std
  resources:
    limits:
      cpus: "0.5"
      memory: 512M
    reservations:
      memory: 256M

x-deploy-heavy: &deploy-heavy
  resources:
    limits:
      cpus: "1.0"
      memory: 1024M
    reservations:
      memory: 512M

x-healthcheck-api: &healthcheck-api
  test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/health || exit 1"]
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 20s

services:
  # ──────────────────────────────────────────────────────────────────────
  # 🔵 INFRAESTRUCTURA
  # ──────────────────────────────────────────────────────────────────────

  # PostgreSQL - Base de datos consolidada
  postgres_db:
    image: postgres:16
    container_name: postgres_db
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          memory: 512M
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh
    networks:
      - okla-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer - Connection Pooler (reduces connection overhead to PostgreSQL)
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    environment:
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD:-password}@postgres_db:5432/postgres"
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      MAX_CLIENT_CONN: 500
      MAX_DB_CONNECTIONS: 50
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      LOG_POOLER_ERRORS: 1
      STATS_PERIOD: 60
      AUTH_TYPE: plain
    ports:
      - "6432:5432"
    networks:
      - okla-net
    depends_on:
      postgres_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

  # pg-backup - Automated PostgreSQL backups (daily, 7-day retention)
  pg-backup:
    profiles: [backup]
    image: prodrigestivill/postgres-backup-local:16
    container_name: pg-backup
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 128M
    environment:
      POSTGRES_HOST: postgres_db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "authservice,vehiclessaleservice,billingservice,mediaservice,notificationservice,errorservice,contactservice,userservice,roleservice,adminservice"
      POSTGRES_EXTRA_OPTS: "--schema=public --blobs --format=custom --compress=6"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
      HEALTHCHECK_PORT: 8080
    volumes:
      - pg_backup_data:/backups
    networks:
      - okla-net
    depends_on:
      postgres_db:
        condition: service_healthy

  # RabbitMQ - Message broker
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit consumer_timeout 1800000"
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    networks:
      - okla-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # Redis - Caché distribuido
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--save",
        "60",
        "1000",
      ]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    ports:
      - "6379:6379"
    networks:
      - okla-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # Consul - Service discovery
  consul:
    image: hashicorp/consul:1.17
    container_name: consul
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    ports:
      - "8500:8500" # HTTP API
      - "8600:8600/udp" # DNS
    command: agent -server -ui -node=server-1 -bootstrap-expect=1 -client=0.0.0.0
    environment:
      CONSUL_BIND_INTERFACE: eth0
    networks:
      - okla-net
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────────
  # � OBSERVABILIDAD (FASE 2)
  # ──────────────────────────────────────────────────────────────────────

  # Seq - Centralized Logging UI (Serilog compatible)
  seq:
    image: datalust/seq:2024.1
    container_name: seq
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80" # Web UI + Ingestion
      - "5342:5341" # API / Ingestion endpoint
    networks:
      - okla-net
    volumes:
      - seq_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "[ -f /data/Documents/metastore.flare ] && exit 0 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Jaeger - Distributed Tracing (OpenTelemetry compatible)
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: jaeger
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Web UI
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "14268:14268" # Jaeger HTTP receiver
      - "14250:14250" # Jaeger gRPC receiver
    networks:
      - okla-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:14269/"]
      interval: 10s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────
  # �🔴 MICROSERVICIOS CRÍTICOS
  # ──────────────────────────────────────────────────────────────────────

  # AuthService - Puerto 5001 (Autenticación JWT)
  authservice:
    profiles: [core]
    build:
      context: ./backend
      dockerfile: AuthService/AuthService.Api/Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 256M
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      Database__Provider: "PostgreSQL"
      Database__ConnectionStrings__PostgreSQL: "Host=postgres_db;Port=5432;Database=authservice;Username=postgres;Password=password;Pooling=true;Minimum Pool Size=1;Maximum Pool Size=10"
      Database__AutoMigrate: "true"
      Jwt__Key: "${JWT__KEY:-clave-super-secreta-desarrollo-32-caracteres-aaa}"
      Jwt__Issuer: "AuthService-Dev"
      Jwt__Audience: "OKLA-Dev"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: "guest"
      RabbitMQ__Password: "guest"
      RabbitMQ__User: "guest"
      RabbitMQ__Enabled: "true"
      Redis__Host: "redis:6379"
      Consul__Host: "http://consul:8500"
      ConfigurationService__BaseUrl: "http://host.docker.internal:15124"
      # OAuth Providers - Use environment variables or docker secrets
      # See compose.secrets.example.yaml for production setup
      Authentication__Google__ClientId: "${GOOGLE_CLIENT_ID:-your-google-client-id}"
      Authentication__Google__ClientSecret: "${GOOGLE_CLIENT_SECRET:-your-google-client-secret}"
      FrontendUrl: "http://localhost:3000"
      # FASE 2: Observability
      Logging__Seq__ServerUrl: "http://seq:80"
      Observability__Otlp__Endpoint: "http://jaeger:4317"
      Observability__SamplingRatio: "1.0"
      Observability__Prometheus__Enabled: "true"
      ErrorHandling__PublishToErrorService: "true"
    ports:
      - "15001:80"
    depends_on:
      postgres_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_started
    networks:
      - okla-net
    volumes:
      - ./backend/AuthService:/app/AuthService
      - ./backend/_Shared/CarDealer.Contracts:/app/_Shared/CarDealer.Contracts
      - ./backend/_Shared/CarDealer.Shared:/app/_Shared/CarDealer.Shared
      - ./backend/_Shared/CarDealer.Shared.Logging:/app/_Shared/CarDealer.Shared.Logging
      - ./backend/_Shared/CarDealer.Shared.ErrorHandling:/app/_Shared/CarDealer.Shared.ErrorHandling
      - ./backend/_Shared/CarDealer.Shared.Observability:/app/_Shared/CarDealer.Shared.Observability
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:80/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  # VehiclesSaleService - Puerto 5010 (CRUD vehículos)
  vehiclessaleservice:
    profiles: [vehicles]
    build:
      context: ./backend
      dockerfile: VehiclesSaleService/VehiclesSaleService.Api/Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 384M
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      Database__Provider: "PostgreSQL"
      Database__ConnectionStrings__PostgreSQL: "Host=postgres_db;Port=5432;Database=vehiclessaleservice;Username=postgres;Password=password;Pooling=true;Minimum Pool Size=1;Maximum Pool Size=10"
      Database__AutoMigrate: "true"
      Jwt__Key: "${JWT__KEY:-clave-super-secreta-desarrollo-32-caracteres-aaa}"
      Jwt__Issuer: "AuthService-Dev"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__User: "guest"
      RabbitMQ__Password: "guest"
      RabbitMQ__Enabled: "true"
      Redis__Host: "redis:6379"
      Consul__Host: "http://consul:8500"
      # FASE 2: Observability
      Logging__Seq__ServerUrl: "http://seq:80"
      Observability__Otlp__Endpoint: "http://jaeger:4317"
      Observability__SamplingRatio: "1.0"
      Observability__Prometheus__Enabled: "true"
      ErrorHandling__PublishToErrorService: "true"
      OKLA_PII_ENCRYPTION_KEY: "CMx0ZJgjwLb3GdHw6laG0ICy09Zu9nKcNUtdzRJNfSQ="
      Services__ConfigurationService: "http://host.docker.internal:15124"
    ports:
      - "15010:80"
    depends_on:
      postgres_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      authservice:
        condition: service_healthy
      seq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - okla-net
    # Usar command para forzar rebuild dentro del contenedor
    command:
      [
        "dotnet",
        "watch",
        "run",
        "--project",
        "/app/VehiclesSaleService/VehiclesSaleService.Api/VehiclesSaleService.Api.csproj",
      ]
    volumes:
      - ./backend/VehiclesSaleService:/app/VehiclesSaleService
      - ./backend/_Shared/CarDealer.Contracts:/app/_Shared/CarDealer.Contracts
      - ./backend/_Shared/CarDealer.Shared:/app/_Shared/CarDealer.Shared
      - ./backend/_Shared/CarDealer.Shared.Logging:/app/_Shared/CarDealer.Shared.Logging
      - ./backend/_Shared/CarDealer.Shared.ErrorHandling:/app/_Shared/CarDealer.Shared.ErrorHandling
      - ./backend/_Shared/CarDealer.Shared.Observability:/app/_Shared/CarDealer.Shared.Observability
      - ./backend/_Shared/CarDealer.Shared.Audit:/app/_Shared/CarDealer.Shared.Audit
      - ./backend/_Shared/CarDealer.Shared.Resilience:/app/_Shared/CarDealer.Shared.Resilience
      - ./backend/_Shared/CarDealer.Shared.Caching:/app/_Shared/CarDealer.Shared.Caching
      - ./backend/ErrorService/ErrorService.Domain:/app/ErrorService/ErrorService.Domain
      - ./backend/ErrorService/ErrorService.Shared:/app/ErrorService/ErrorService.Shared
      # Volúmenes anónimos para excluir bin/obj de macOS
      - /app/VehiclesSaleService/VehiclesSaleService.Api/bin
      - /app/VehiclesSaleService/VehiclesSaleService.Api/obj
      - /app/VehiclesSaleService/VehiclesSaleService.Domain/bin
      - /app/VehiclesSaleService/VehiclesSaleService.Domain/obj
      - /app/VehiclesSaleService/VehiclesSaleService.Application/bin
      - /app/VehiclesSaleService/VehiclesSaleService.Application/obj
      - /app/VehiclesSaleService/VehiclesSaleService.Infrastructure/bin
      - /app/VehiclesSaleService/VehiclesSaleService.Infrastructure/obj
      - /app/VehiclesSaleService/VehiclesSaleService.Shared/bin
      - /app/VehiclesSaleService/VehiclesSaleService.Shared/obj
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:80/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s

  # MediaService - Puerto 5020 (Gestión de imágenes)
  mediaservice:
    profiles: [vehicles]
    build:
      context: ./backend
      dockerfile: MediaService/MediaService.Api/Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          memory: 512M
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      Database__Provider: "PostgreSQL"
      Database__ConnectionStrings__PostgreSQL: "Host=postgres_db;Port=5432;Database=mediaservice;Username=postgres;Password=password;Pooling=true;Minimum Pool Size=1;Maximum Pool Size=10"
      Database__AutoMigrate: "true"
      Jwt__Key: "${JWT__KEY:-clave-super-secreta-desarrollo-32-caracteres-aaa}"
      Jwt__Issuer: "AuthService-Dev"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Enabled: "true"
      RabbitMQ__UserName: "guest"
      RabbitMQ__Password: "guest"
      Redis__Host: "redis:6379"
      Consul__Host: "http://consul:8500"
      Consul__Enabled: "false"
      # Storage configuration - AWS S3 Enabled
      Storage__Provider: "s3"
      Storage__S3__AccessKey: "${AWS_ACCESS_KEY_ID:-AKIAQII4Y254AUECTCON}"
      Storage__S3__SecretKey: "${AWS_SECRET_ACCESS_KEY:-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}"
      Storage__S3__BucketName: "${AWS_S3_BUCKET:-okla-images-2026}"
      Storage__S3__Region: "${AWS_REGION:-us-east-2}"
      Storage__S3__CdnBaseUrl: ""
      Storage__S3__PreSignedUrlExpirationMinutes: "60"
      Storage__Local__BasePath: "/app/media-files"
      Storage__Local__BaseUrl: "http://localhost:15020/uploads"
      ServiceUrls__ErrorService: "http://errorservice:80"
      Services__ConfigurationService: "http://host.docker.internal:15124"
    ports:
      - "15020:80"
    depends_on:
      postgres_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      authservice:
        condition: service_healthy
    networks:
      - okla-net
    volumes:
      - ./backend/MediaService:/app/MediaService
      - ./backend/_Shared/CarDealer.Contracts:/app/_Shared/CarDealer.Contracts
      - ./backend/_Shared/CarDealer.Shared:/app/_Shared/CarDealer.Shared
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:80/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────────────────────────────
  # 🟠 MICROSERVICIOS IMPORTANTES
  # ──────────────────────────────────────────────────────────────────────

  # UserService - Puerto 5002 (Gestión de usuarios y perfiles)
  userservice:
    profiles: [core]
    build:
      context: ./backend
      dockerfile: UserService/UserService.Api/Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          memory: 512M
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      Database__Provider: "PostgreSQL"
      Database__ConnectionStrings__PostgreSQL: "Host=postgres_db;Port=5432;Database=userservice;Username=postgres;Password=password;Pooling=true;Minimum Pool Size=1;Maximum Pool Size=10"
      Database__AutoMigrate: "true"
      Jwt__Key: "${JWT__KEY:-clave-super-secreta-desarrollo-32-caracteres-aaa}"
      Jwt__Issuer: "AuthService-Dev"
      Jwt__Audience: "OKLA-Dev"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__User: "guest"
      RabbitMQ__Password: "guest"
      RabbitMQ__Enabled: "true"
      Redis__Host: "redis:6379"
      Consul__Host: "http://consul:8500"
      # FASE 2: Observability
      Logging__Seq__ServerUrl: "http://seq:80"
      Observability__Otlp__Endpoint: "http://jaeger:4317"
      Observability__SamplingRatio: "1.0"
      Observability__Prometheus__Enabled: "true"
      ErrorHandling__PublishToErrorService: "true"
      OKLA_PII_ENCRYPTION_KEY: "CMx0ZJgjwLb3GdHw6laG0ICy09Zu9nKcNUtdzRJNfSQ="
    ports:
      - "15002:80"
    depends_on:
      postgres_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - okla-net
    volumes:
      - ./backend/UserService:/app/UserService
      - ./backend/_Shared/CarDealer.Contracts:/app/_Shared/CarDealer.Contracts
      - ./backend/_Shared/CarDealer.Shared:/app/_Shared/CarDealer.Shared
      - ./backend/_Shared/CarDealer.Shared.Logging:/app/_Shared/CarDealer.Shared.Logging
      - ./backend/_Shared/CarDealer.Shared.ErrorHandling:/app/_Shared/CarDealer.Shared.ErrorHandling
      - ./backend/_Shared/CarDealer.Shared.Observability:/app/_Shared/CarDealer.Shared.Observability
      - ./backend/_Shared/ServiceDiscovery:/app/_Shared/ServiceDiscovery
    healthcheck:
      test:
        [
          "CMD-SHELL",
