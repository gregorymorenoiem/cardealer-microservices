# =============================================================================
# Codecov Configuration — OKLA Microservices
# Enforces 80% minimum coverage with PR comments and status checks
# =============================================================================

codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

flags:
  frontend-unit:
    paths:
      - frontend/web-next/src/
    carryforward: true
  dotnet-unit:
    paths:
      - backend/
    carryforward: true

ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/test/**"
  - "**/tests/**"
  - "**/node_modules/**"
  - "**/bin/**"
  - "**/obj/**"
  - "**/_DESCARTADOS/**"
  - "scripts/**"
