# =============================================================================
# DEPENDABOT — Automated Dependency Updates
# =============================================================================
# Keeps NuGet, npm, Docker, and GitHub Actions dependencies up to date
# =============================================================================

version: 2

updates:
  # ============================================
  # GitHub Actions — keep action versions current
  # ============================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5

  # ============================================
  # NuGet — .NET backend services
  # ============================================
  - package-ecosystem: "nuget"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    ignore:
      # Ignore major version bumps for core framework (manual upgrade)
      - dependency-name: "Microsoft.AspNetCore.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.EntityFrameworkCore.*"
        update-types: ["version-update:semver-major"]

  # ============================================
  # npm (pnpm) — Frontend Next.js
  # ============================================
  - package-ecosystem: "npm"
    directory: "/frontend/web-next"
    schedule:
      interval: "weekly"
      day: "wednesday"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    ignore:
      # Ignore major version bumps for Next.js (manual upgrade)
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # ============================================
  # Docker — Base images in Dockerfiles
  # ============================================
  - package-ecosystem: "docker"
    directory: "/backend/AuthService"
    schedule:
      interval: "weekly"
      day: "thursday"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/frontend/web-next"
    schedule:
      interval: "weekly"
      day: "thursday"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 3

  # ============================================
  # pip — Python AI/ML services
  # ============================================
  - package-ecosystem: "pip"
    directory: "/backend/AIProcessingService/workers"
    schedule:
      interval: "weekly"
      day: "friday"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 5
    ignore:
      # Ignore major version bumps for ML frameworks (manual upgrade)
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      - dependency-name: "torchvision"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
    directory: "/backend/ChatbotService/LlmServer"
    schedule:
      interval: "weekly"
      day: "friday"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 5
