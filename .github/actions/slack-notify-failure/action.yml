# =============================================================================
# Composite Action: Slack Failure Notification
# =============================================================================
# Sends a rich Slack message to #okla-ci-cd when a CI/CD stage fails.
# Includes: failed stage name, developer, log link, commit diff link.
# Fires immediately on failure (within 60s of the failed step).
# =============================================================================

name: "Slack Failure Notification"
description: "Sends a Slack notification to #okla-ci-cd when a CI/CD stage fails"

inputs:
  stage-name:
    description: "Name of the stage/job that failed"
    required: true
  webhook-url:
    description: "Slack Incoming Webhook URL"
    required: true
  github-token:
    description: "GitHub token for API access"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: 🔔 Send Slack failure notification
      shell: bash
      env:
        STAGE_NAME: ${{ inputs.stage-name }}
        WEBHOOK_URL: ${{ inputs.webhook-url }}
      run: |
        # Build URLs
        RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
        DIFF_URL="${COMMIT_URL}"
        SHORT_SHA="${GITHUB_SHA:0:7}"
        AUTHOR="${GITHUB_ACTOR}"
        COMMIT_MSG=$(git log -1 --format='%s' 2>/dev/null | head -c 200 || echo "N/A")
        BRANCH="${GITHUB_REF_NAME}"

        # Build JSON payload
        PAYLOAD=$(jq -n \
          --arg channel "#okla-ci-cd" \
          --arg stage "$STAGE_NAME" \
          --arg author "$AUTHOR" \
          --arg branch "$BRANCH" \
          --arg sha "$SHORT_SHA" \
          --arg commit_url "$COMMIT_URL" \
          --arg msg "$COMMIT_MSG" \
          --arg run_url "$RUN_URL" \
          --arg diff_url "$DIFF_URL" \
          '{
            channel: $channel,
            username: "OKLA CI/CD",
            icon_emoji: ":rotating_light:",
            attachments: [{
              color: "#E01E5A",
              blocks: [
                { type: "header", text: { type: "plain_text", text: ("❌ Pipeline Failure: " + $stage), emoji: true } },
                { type: "section", fields: [
                  { type: "mrkdwn", text: ("*Stage:*\n" + $stage) },
                  { type: "mrkdwn", text: ("*Developer:*\n" + $author) },
                  { type: "mrkdwn", text: ("*Branch:*\n`" + $branch + "`") },
                  { type: "mrkdwn", text: ("*Commit:*\n<" + $commit_url + "|`" + $sha + "`>") }
                ]},
                { type: "section", text: { type: "mrkdwn", text: ("*Commit Message:*\n" + $msg) } },
                { type: "actions", elements: [
                  { type: "button", text: { type: "plain_text", text: "📋 View Logs", emoji: true }, url: $run_url, style: "danger" },
                  { type: "button", text: { type: "plain_text", text: "🔍 View Diff", emoji: true }, url: $diff_url }
                ]}
              ]
            }]
          }')

        curl -sf -X POST "$WEBHOOK_URL" \
          -H 'Content-Type: application/json' \
          -d "$PAYLOAD"

        echo "✅ Slack notification sent to #okla-ci-cd"
