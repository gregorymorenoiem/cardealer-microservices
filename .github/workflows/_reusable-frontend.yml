# =============================================================================
# REUSABLE WORKFLOW: Frontend (Next.js 14) CI/CD
# =============================================================================
# Template reutilizable para frontend web (Next.js + pnpm)
# Incluye: Lint, Type Check, Tests, Build, Docker
# =============================================================================

name: Reusable Frontend CI/CD

on:
  workflow_call:
    inputs:
      node-version:
        description: "Versión de Node.js"
        required: false
        type: string
        default: "20.x"
      working-directory:
        description: "Directorio del frontend"
        required: false
        type: string
        default: "frontend/web-next"
      run-e2e-tests:
        description: "Ejecutar tests E2E"
        required: false
        type: boolean
        default: false
      run-docker-build:
        description: "Construir imagen Docker"
        required: false
        type: boolean
        default: true
      run-docker-push:
        description: "Push imagen a registry"
        required: false
        type: boolean
        default: false
      docker-registry:
        description: "Docker registry URL"
        required: false
        type: string
        default: "ghcr.io"

jobs:
  # ============================================
  # JOB 1: Lint & Type Check (Fast)
  # ============================================
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 📦 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        working-directory: ${{ inputs.working-directory }}
        run: pnpm lint

      - name: 📝 Type check
        working-directory: ${{ inputs.working-directory }}
        run: pnpm typecheck

  # ============================================
  # JOB 2: Unit Tests
  # ============================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: [self-hosted, macOS, ARM64]
    needs: lint-and-typecheck

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 📦 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run unit tests
        working-directory: ${{ inputs.working-directory }}
        run: pnpm test -- --run --reporter=verbose --coverage
        continue-on-error: true

      - name: 📊 Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ inputs.working-directory }}/coverage
          retention-days: 7

  # ============================================
  # JOB 3: Docker Build & Push
  # ============================================
  docker:
    name: 🐳 Docker Build
    needs: unit-tests
    runs-on: [self-hosted, macOS, ARM64]
    if: always() && !cancelled() && inputs.run-docker-build
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🩺 Ensure Docker daemon is running
        timeout-minutes: 3
        run: |
          # Try to connect; if daemon is down, (re)start Docker Desktop
          if ! timeout 10 docker version > /dev/null 2>&1; then
            echo "⚠️ Docker daemon not responding — starting Docker Desktop..."
            open /Applications/Docker.app 2>/dev/null || true
            echo "⏳ Waiting for Docker daemon (up to 2 min)..."
            for i in $(seq 1 24); do
              sleep 5
              if timeout 5 docker version > /dev/null 2>&1; then
                echo "✅ Docker is ready (attempt $i)"
                break
              fi
              echo "  Still waiting... attempt $i/24"
            done
          else
            echo "✅ Docker daemon is healthy"
          fi

      - name: 🔧 Set up Docker Buildx
        # Docker Desktop on macOS ARM64 already bundles QEMU for linux/amd64 —
        # setup-qemu-action is not needed and causes exit code 1 on Mac runners.
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: � Login to Container Registry
        if: inputs.run-docker-push
        timeout-minutes: 2
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: 🏷️ Generate version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🏗️ Build Docker image
        timeout-minutes: 45
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working-directory }}
          file: ${{ inputs.working-directory }}/Dockerfile
          push: ${{ inputs.run-docker-push }}
          platforms: linux/amd64
          network: host
          tags: |
            ${{ inputs.docker-registry }}/${{ github.repository_owner }}/frontend-web:${{ steps.version.outputs.version }}
            ${{ inputs.docker-registry }}/${{ github.repository_owner }}/frontend-web:latest
          cache-from: type=local,src=/tmp/.buildx-cache-frontend-web
          cache-to: type=local,dest=/tmp/.buildx-cache-new-frontend-web,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_SITE_URL=https://okla.com.do

      - name: 🧹 Move cache
        run: |
          rm -rf /tmp/.buildx-cache-frontend-web
          mv /tmp/.buildx-cache-new-frontend-web /tmp/.buildx-cache-frontend-web
