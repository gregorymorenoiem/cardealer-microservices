# =============================================================================
# REUSABLE WORKFLOW: Frontend (Next.js 14) CI/CD
# =============================================================================
# Template reutilizable para frontend web (Next.js + pnpm)
# Incluye: Lint, Type Check, Tests, Build, Docker
# =============================================================================

name: Reusable Frontend CI/CD

on:
  workflow_call:
    inputs:
      node-version:
        description: "Versión de Node.js"
        required: false
        type: string
        default: "20.x"
      working-directory:
        description: "Directorio del frontend"
        required: false
        type: string
        default: "frontend/web-next"
      run-e2e-tests:
        description: "Ejecutar tests E2E"
        required: false
        type: boolean
        default: false
      run-docker-build:
        description: "Construir imagen Docker"
        required: false
        type: boolean
        default: true
      run-docker-push:
        description: "Push imagen a registry"
        required: false
        type: boolean
        default: false
      docker-registry:
        description: "Docker registry URL"
        required: false
        type: string
        default: "ghcr.io"

jobs:
  # ============================================
  # JOB 1: Lint & Type Check (Fast)
  # ============================================
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 📦 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ inputs.working-directory }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('frontend/web-next/src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: 📦 Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        working-directory: ${{ inputs.working-directory }}
        run: pnpm eslint . --format=eslint-formatter-github-actions

      - name: 📝 Type check
        working-directory: ${{ inputs.working-directory }}
        run: pnpm typecheck

      - name: � Audit npm dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: �🔔 Notify failure to Slack
        if: failure()
        uses: ./.github/actions/slack-notify-failure
        continue-on-error: true
        with:
          stage-name: "Frontend — Lint & Type Check"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # JOB 2: Unit Tests
  # ============================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: [self-hosted, macOS, ARM64]
    needs: lint-and-typecheck
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 📦 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run unit tests
        timeout-minutes: 3
        working-directory: ${{ inputs.working-directory }}
        run: pnpm test -- --run --reporter=verbose --coverage

      - name: 📊 Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ inputs.working-directory }}/coverage
          retention-days: 7

      - name: � Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          directory: ${{ inputs.working-directory }}/coverage
          flags: frontend-unit
          name: frontend-unit-coverage
          fail_ci_if_error: false

      - name: �🔔 Notify failure to Slack
        if: failure()
        uses: ./.github/actions/slack-notify-failure
        continue-on-error: true
        with:
          stage-name: "Frontend — Unit Tests"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # JOB 3: Docker Build & Push
  # ============================================
  docker:
    name: 🐳 Docker Build
    needs: unit-tests
    runs-on: [self-hosted, macOS, ARM64]
    if: success() && inputs.run-docker-build
    permissions:
      contents: read
      packages: write
    # DOCKER_CONFIG is set dynamically in the "Remove Docker Desktop buildx symlink" step
    # via GITHUB_ENV so all subsequent steps (including docker/setup-buildx-action) inherit it.
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: "🗑️ Remove Docker Desktop buildx symlink & create CI Docker config"
        run: |
          # 1. Remove Docker Desktop buildx symlink so setup-buildx-action can
          #    install its binary as a regular file (symlink to Docker.app = EPERM).
          rm -f ~/.docker/cli-plugins/docker-buildx

          # 2. Create a clean CI-specific DOCKER_CONFIG with credsStore:"" (empty).
          #    Docker CLI on macOS falls back to osxkeychain when credsStore is absent.
          #    Setting it to "" explicitly disables all credential helpers, so Docker
          #    uses auths{} in config.json — no macOS Keychain interaction.
          CI_CFG=$(mktemp -d)
          jq '. + {"credsStore": "", "credHelpers": {}}' "$HOME/.docker/config.json" \
            > "$CI_CFG/config.json" 2>/dev/null \
            || printf '{"auths":{},"credsStore":"","credHelpers":{}}' > "$CI_CFG/config.json"
          echo "CI DOCKER_CONFIG: $(cat "$CI_CFG/config.json")"
          echo "DOCKER_CONFIG=$CI_CFG" >> "$GITHUB_ENV"

      - name: 🩺 Ensure Docker daemon is running (Colima)
        timeout-minutes: 6
        run: |
          COLIMA_BIN="/opt/homebrew/bin/colima"
          COLIMA_SOCKET="$HOME/.colima/default/docker.sock"

          # FIX: Apuntar DOCKER_HOST directamente al socket de Colima.
          # Esto evita race conditions cuando múltiples jobs paralelos intentan
          # cambiar el contexto global de Docker al mismo tiempo.
          export DOCKER_HOST="unix://$COLIMA_SOCKET"
          echo "DOCKER_HOST=unix://$COLIMA_SOCKET" >> "$GITHUB_ENV"

          # Fast path: Docker already responding
          if docker version > /dev/null 2>&1; then
            echo "✅ Docker daemon is healthy (Colima already running)"
            docker version --format '  Engine: {{.Server.Version}} | Context: {{.Client.Context}}'
            exit 0
          fi

          echo "⚠️ Docker not responding via Colima socket. Checking Colima status..."
          if [ -x "$COLIMA_BIN" ]; then
            "$COLIMA_BIN" status 2>&1 || true
            echo "▶️ Starting Colima..."
            "$COLIMA_BIN" start 2>&1 | head -30 || true
          else
            echo "::error::Colima not found at $COLIMA_BIN — instalar con: brew install colima"
            exit 1
          fi

          # Esperar hasta 3 minutos para que Docker responda
          for i in $(seq 1 36); do
            sleep 5
            if docker version > /dev/null 2>&1; then
              echo "✅ Docker ready after $((i*5))s"
              docker version --format '  Engine: {{.Server.Version}} | Context: {{.Client.Context}}'
              exit 0
            fi
            if [ $i -eq 36 ]; then
              echo "::error::Docker daemon no respondió en 3 minutos"
              [ -x "$COLIMA_BIN" ] && "$COLIMA_BIN" status 2>&1 || true
              echo "Socket existe: $(test -S \"$COLIMA_SOCKET\" && echo 'SÍ' || echo 'NO')"
              exit 1
            fi
            echo "  Waiting... $((i*5))s / 180s"
          done

      - name: "🐳 Pre-pull buildkit image (avoids Docker Hub auth in buildx create)"
        run: |
          # moby/buildkit:buildx-stable-1 is needed by docker buildx create.
          # If not in local cache, the daemon calls the credential helper which
          # is docker-credential-osxkeychain — locked in background CI sessions.
          # Pre-pulling from the interactive terminal (when keychain is available)
          # caches the image so CI finds it locally and skips credential lookup.
          # If not cached (fresh runner restart), the pull falls back to anonymous.
          if docker image inspect moby/buildkit:buildx-stable-1 > /dev/null 2>&1; then
            echo "✅ moby/buildkit:buildx-stable-1 already cached — no pull needed"
          else
            echo "⚠️ moby/buildkit:buildx-stable-1 not in cache — pulling anonymously"
            DOCKER_CONFIG=/tmp/docker-anon-cfg \
              && mkdir -p "$DOCKER_CONFIG" \
              && printf '{"auths":{}}' > "$DOCKER_CONFIG/config.json" \
              && DOCKER_CONFIG="$DOCKER_CONFIG" docker pull moby/buildkit:buildx-stable-1
          fi

      - name: 🔧 Set up Docker Buildx
        # Colima on macOS ARM64 supports linux/amd64 via Rosetta 2 (vz) or QEMU (binfmt_misc).
        # setup-qemu-action is not needed and causes exit code 1 on Mac runners.
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver-opts: |
            network=host

      - name: 🔐 Reset Docker config post-buildx (ensure credsStore stays empty)
        if: inputs.run-docker-push
        run: |
          echo "DOCKER_CONFIG=$DOCKER_CONFIG"
          echo "Config before reset: $(cat "$DOCKER_CONFIG/config.json" 2>/dev/null || echo '(not found)')"
          jq '. + {"credsStore": "", "credHelpers": {}}' "$DOCKER_CONFIG/config.json" \
            > /tmp/dc_reset.json \
            && mv /tmp/dc_reset.json "$DOCKER_CONFIG/config.json" \
            || printf '{"auths":{},"credsStore":"","credHelpers":{}}' > "$DOCKER_CONFIG/config.json"
          echo "Config after reset: $(cat "$DOCKER_CONFIG/config.json")"

      - name: 🔐 Login to Container Registry
        if: inputs.run-docker-push
        timeout-minutes: 2
        run: |
          # Write GHCR credentials directly to auths{} without calling docker login.
          # docker/login-action and `docker login` on macOS always fall back to
          # docker-credential-osxkeychain, even when credsStore is "".
          # Writing to auths{} directly avoids credential helpers completely.
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          USER="${{ github.actor }}"
          AUTH=$(printf "%s:%s" "$USER" "$TOKEN" | base64 | tr -d '\n')
          jq --arg auth "$AUTH" '.auths["ghcr.io"] = {"auth": $auth}' \
            "$DOCKER_CONFIG/config.json" > /tmp/dc_auth.json \
            && mv /tmp/dc_auth.json "$DOCKER_CONFIG/config.json"
          echo "✅ Logged into ghcr.io (credentials written to config.json auths)"

      - name: 🏷️ Generate version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🏗️ Build Docker image
        timeout-minutes: 20
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working-directory }}
          file: ${{ inputs.working-directory }}/Dockerfile
          push: ${{ inputs.run-docker-push }}
          platforms: linux/amd64
          network: host
          tags: |
            ${{ inputs.docker-registry }}/${{ github.repository_owner }}/frontend-web:${{ steps.version.outputs.version }}
            ${{ inputs.docker-registry }}/${{ github.repository_owner }}/frontend-web:sha-${{ github.sha }}
            ${{ inputs.docker-registry }}/${{ github.repository_owner }}/frontend-web:latest
          cache-from: type=gha,scope=frontend-web
          cache-to: type=gha,scope=frontend-web,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_SITE_URL=https://okla.com.do
