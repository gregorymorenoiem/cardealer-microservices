# =============================================================================
# REUSABLE WORKFLOW: Frontend (Next.js 14) CI/CD
# =============================================================================
# Template reutilizable para frontend web (Next.js + pnpm)
# Incluye: Lint, Type Check, Tests, Build, Docker
# =============================================================================

name: Reusable Frontend CI/CD

on:
  workflow_call:
    inputs:
      node-version:
        description: "Versión de Node.js"
        required: false
        type: string
        default: "20.x"
      working-directory:
        description: "Directorio del frontend"
        required: false
        type: string
        default: "frontend/web-next"
      run-e2e-tests:
        description: "Ejecutar tests E2E"
        required: false
        type: boolean
        default: false
      run-docker-build:
        description: "Construir imagen Docker"
        required: false
        type: boolean
        default: true
      run-docker-push:
        description: "Push imagen a registry"
        required: false
        type: boolean
        default: false
      docker-registry:
        description: "Docker registry URL"
        required: false
        type: string
        default: "ghcr.io"
    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false

jobs:
  # ============================================
  # JOB 1: Lint & Type Check (Fast)
  # ============================================
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 📦 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        working-directory: ${{ inputs.working-directory }}
        run: pnpm lint

      - name: 📝 Type check
        working-directory: ${{ inputs.working-directory }}
        run: pnpm typecheck

  # ============================================
  # JOB 2: Unit Tests
  # ============================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: [self-hosted, macOS, ARM64]
    needs: lint-and-typecheck

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 📦 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run unit tests
        working-directory: ${{ inputs.working-directory }}
        run: pnpm test -- --run --reporter=verbose --coverage
        continue-on-error: true

      - name: 📊 Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ inputs.working-directory }}/coverage
          retention-days: 7

  # ============================================
  # JOB 3: Docker Build & Push
  # ============================================
  docker:
    name: 🐳 Docker Build
    needs: unit-tests
    runs-on: [self-hosted, macOS, ARM64]
    if: always() && !cancelled() && inputs.run-docker-build
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up QEMU (cross-compile linux/amd64 desde ARM64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-frontend-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-frontend-

      - name: 🔐 Login to Container Registry
        if: inputs.run-docker-push
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: 🏷️ Generate version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working-directory }}
          file: ${{ inputs.working-directory }}/Dockerfile
          push: ${{ inputs.run-docker-push }}
          platforms: linux/amd64
          tags: |
            ${{ inputs.docker-registry }}/${{ github.repository_owner }}/frontend-web:${{ steps.version.outputs.version }}
            ${{ inputs.docker-registry }}/${{ github.repository_owner }}/frontend-web:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_SITE_URL=https://okla.com.do

      - name: 🧹 Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
