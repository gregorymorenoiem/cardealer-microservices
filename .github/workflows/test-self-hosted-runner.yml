name: "Test Self-Hosted Runner"

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/test-self-hosted-runner.yml"
    branches: [main]

jobs:
  verify-runner:
    name: "Verify Self-Hosted Runner"
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Runner identity"
        run: |
          echo "## Runner Info" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Name  | $RUNNER_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| OS    | $RUNNER_OS |" >> $GITHUB_STEP_SUMMARY
          echo "| Arch  | $(uname -m) |" >> $GITHUB_STEP_SUMMARY
          echo "| Host  | $(hostname) |" >> $GITHUB_STEP_SUMMARY
          echo "Runner: $RUNNER_NAME | OS: $RUNNER_OS | Arch: $(uname -m)"

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: "Verify .NET"
        run: |
          echo "dotnet: $(dotnet --version)"
          echo "| .NET SDK | $(dotnet --version) |" >> $GITHUB_STEP_SUMMARY

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: "Verify Node/pnpm"
        run: |
          echo "Node: $(node --version) | pnpm: $(pnpm --version)"
          echo "| Node.js | $(node --version) |" >> $GITHUB_STEP_SUMMARY
          echo "| pnpm    | $(pnpm --version) |" >> $GITHUB_STEP_SUMMARY

      - name: "Check Docker"
        continue-on-error: true
        run: |
          DOCKER_OK=$(docker info --format "{{.ServerVersion}}" 2>/dev/null || true)
          if [ -z "$DOCKER_OK" ]; then
            echo "Docker Desktop no esta corriendo. Iniciar manualmente para habilitar builds Docker."
            echo "| Docker | no disponible |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Docker: $DOCKER_OK"
            echo "| Docker | $DOCKER_OK |" >> $GITHUB_STEP_SUMMARY
            docker buildx create --use --name okla-runner-test 2>/dev/null || true
            printf 'FROM --platform=linux/amd64 alpine:3.20\nCMD ["echo","ok"]\n' > /tmp/okla_test.dockerfile
            docker buildx build --platform linux/amd64 --file /tmp/okla_test.dockerfile --tag okla-runner-test:tmp --load /tmp
            docker run --rm okla-runner-test:tmp
            docker rmi okla-runner-test:tmp 2>/dev/null || true
            docker buildx rm okla-runner-test 2>/dev/null || true
            echo "| Docker linux/amd64 build | OK |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "System resources"
        run: |
          echo "| CPU Cores | $(sysctl -n hw.ncpu) |" >> $GITHUB_STEP_SUMMARY
          echo "| RAM | $(( $(sysctl -n hw.memsize) / 1024 / 1024 / 1024 )) GB |" >> $GITHUB_STEP_SUMMARY
          echo "| Free Disk | $(df -h / | tail -1 | awk '{print $4}') |" >> $GITHUB_STEP_SUMMARY

      - name: "Final summary"
        run: |
          echo "Self-hosted runner OK"
          echo "Runner : $RUNNER_NAME"
          echo ".NET   : $(dotnet --version)"
          echo "Node   : $(node --version)"
          echo "pnpm   : $(pnpm --version)"
          echo "Arch   : $(uname -m)"
