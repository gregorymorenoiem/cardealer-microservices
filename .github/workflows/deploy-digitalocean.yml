# =============================================================================
# DEPLOY TO DIGITAL OCEAN KUBERNETES
# =============================================================================
# Workflow dedicado para deployment a DOKS
# Trigger: Manual o después de CI exitoso en main
# =============================================================================

name: 🚀 Deploy to Digital Ocean

on:
  # Trigger manual
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      services:
        description: 'Services to deploy (comma-separated or "all")'
        required: false
        default: "all"
        type: string

  # Trigger automático después de CI exitoso en main
  workflow_run:
    workflows: ["🚀 Smart CI/CD"]
    types:
      - completed
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ============================================
  # Prepare deployment
  # ============================================
  prepare:
    name: 📋 Prepare Deployment
    runs-on: [self-hosted, macOS, ARM64]
    if: ${{ (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') || github.event_name == 'workflow_dispatch' }}
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      version: ${{ steps.version.outputs.version }}
      services: ${{ steps.services.outputs.list }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.workflow_run.head_branch }}" == "main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: 🔢 Get version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          SHORT_SHA="${{ github.sha }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📌 Deploying version: $VERSION (sha: ${SHORT_SHA:0:7})"

      - name: 📋 Determine services to deploy
        id: services
        run: |
          if [ "${{ inputs.services }}" == "all" ] || [ -z "${{ inputs.services }}" ]; then
            # Note: vehiclesrentservice, propertiessaleservice, propertiesrentservice disabled temporarily
            SERVICES="frontend-web,gateway,authservice,userservice,roleservice,vehiclessaleservice,mediaservice,notificationservice,billingservice,errorservice,kycservice,auditservice,idempotencyservice,contactservice,adminservice,dealermanagementservice,chatbotservice"
          else
            SERVICES="${{ inputs.services }}"
          fi
          echo "list=$SERVICES" >> $GITHUB_OUTPUT
          echo "📦 Services to deploy: $SERVICES"

  # ============================================
  # Deploy to Kubernetes
  # ============================================
  deploy:
    name: 🚀 Deploy to ${{ needs.prepare.outputs.environment }}
    needs: prepare
    runs-on: [self-hosted, macOS, ARM64]
    environment: ${{ needs.prepare.outputs.environment }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Authenticate doctl
        run: |
          doctl auth init --access-token ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: 🔐 Configure Kubernetes
        run: |
          doctl kubernetes cluster kubeconfig save ${{ secrets.DO_CLUSTER_NAME }}
          kubectl cluster-info

      - name: 📦 Create namespace if not exists
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: 🔒 Apply secrets
        run: |
          # =============================================================
          # All secrets are created from GitHub Secrets
          # No hardcoded credentials in K8s manifests
          # =============================================================

          PG_USER="${{ secrets.POSTGRES_USER }}"
          PG_PASS="${{ secrets.POSTGRES_PASSWORD }}"
          PG_HOST="${{ secrets.POSTGRES_HOST || 'postgres' }}"
          PG_PORT="${{ secrets.POSTGRES_PORT || '5432' }}"
          JWT_KEY="${{ secrets.JWT_SECRET_KEY }}"
          REDIS_PASS="${{ secrets.REDIS_PASSWORD }}"
          RABBITMQ_USER="${{ secrets.RABBITMQ_USER }}"
          RABBITMQ_PASS="${{ secrets.RABBITMQ_PASSWORD }}"

          # --- PostgreSQL master secret (used by infrastructure.yaml StatefulSet) ---
          kubectl create secret generic postgres-master-secret \
            --from-literal=POSTGRES_PASSWORD="$PG_PASS" \
            --from-literal=password="$PG_PASS" \
            -n okla --dry-run=client -o yaml | kubectl apply -f -

          # --- PostgreSQL password secret (used by databases.yaml per-service StatefulSets) ---
          kubectl create secret generic postgres-password \
            --from-literal=password="$PG_PASS" \
            -n okla --dry-run=client -o yaml | kubectl apply -f -

          # --- Per-service DB secrets ---
          SERVICES="authservice userservice roleservice vehiclessaleservice mediaservice billingservice notificationservice errorservice chatbotservice kycservice auditservice idempotencyservice contactservice adminservice dealermanagementservice reviewservice searchagent supportagent"

          for SVC in $SERVICES; do
            kubectl create secret generic ${SVC}-db-secret \
              --from-literal=Database__Provider="PostgreSQL" \
              --from-literal=Database__Host="$PG_HOST" \
              --from-literal=Database__Port="$PG_PORT" \
              --from-literal=Database__Database="$SVC" \
              --from-literal=Database__Username="$PG_USER" \
              --from-literal=Database__Password="$PG_PASS" \
              --from-literal=Database__AutoMigrate="true" \
              --from-literal=Database__ConnectionStrings__PostgreSQL="Host=$PG_HOST;Port=$PG_PORT;Database=$SVC;Username=$PG_USER;Password=$PG_PASS;Include Error Detail=false" \
              --from-literal=ConnectionStrings__DefaultConnection="Host=$PG_HOST;Port=$PG_PORT;Database=$SVC;Username=$PG_USER;Password=$PG_PASS;Include Error Detail=false" \
              -n okla --dry-run=client -o yaml | kubectl apply -f -
          done

          # --- JWT secrets (shared by all services) ---
          kubectl create secret generic jwt-secrets \
            --from-literal=Jwt__Key="$JWT_KEY" \
            --from-literal=Jwt__Issuer="okla-api" \
            --from-literal=Jwt__Audience="okla-clients" \
            --from-literal=Jwt__ExpirationMinutes="60" \
            --from-literal=Jwt__RefreshExpirationDays="7" \
            -n okla --dry-run=client -o yaml | kubectl apply -f -

          # --- Redis secrets ---
          kubectl create secret generic redis-secrets \
            --from-literal=ConnectionStrings__Redis="redis:6379,password=$REDIS_PASS" \
            --from-literal=REDIS_PASSWORD="$REDIS_PASS" \
            -n okla --dry-run=client -o yaml | kubectl apply -f -

          # --- RabbitMQ secrets ---
          kubectl create secret generic rabbitmq-secrets \
            --from-literal=RABBITMQ_USER="$RABBITMQ_USER" \
            --from-literal=RABBITMQ_PASSWORD="$RABBITMQ_PASS" \
            --from-literal=RabbitMQ__UserName="$RABBITMQ_USER" \
            --from-literal=RabbitMQ__Password="$RABBITMQ_PASS" \
            -n okla --dry-run=client -o yaml | kubectl apply -f -

          # --- External services ---
          kubectl create secret generic external-services-secrets \
            --from-literal=STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} \
            --from-literal=STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }} \
            --from-literal=SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }} \
            --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -n okla --dry-run=client -o yaml | kubectl apply -f -

          # --- Docker registry secret ---
          # ⚠️ Uses GHCR_PAT (persistent Fine-grained PAT with read:packages scope)
          # instead of GITHUB_TOKEN (ephemeral, expires after workflow completes).
          # Without a persistent token, pods get ImagePullBackOff after workflow finishes.
          kubectl create secret docker-registry registry-credentials \
            --docker-server=ghcr.io \
            --docker-username=${{ github.repository_owner }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            -n okla --dry-run=client -o yaml | kubectl apply -f -

          # --- Consolidated okla-secrets (chatbot + shared) ---
          kubectl create secret generic okla-secrets \
            --from-literal=chatbot-db-connection="Host=$PG_HOST;Port=$PG_PORT;Database=chatbotservice;Username=$PG_USER;Password=$PG_PASS;SslMode=Prefer" \
            --from-literal=jwt-secret-key="$JWT_KEY" \
            --from-literal=rabbitmq-user="$RABBITMQ_USER" \
            --from-literal=rabbitmq-password="$RABBITMQ_PASS" \
            --from-literal=whatsapp-verify-token="${{ secrets.WHATSAPP_VERIFY_TOKEN }}" \
            --from-literal=whatsapp-access-token="${{ secrets.WHATSAPP_ACCESS_TOKEN }}" \
            --from-literal=whatsapp-phone-number-id="${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}" \
            -n okla --dry-run=client -o yaml | kubectl apply -f -

          # --- Claude / Anthropic API key (SupportAgent, SearchAgent, ChatbotService) ---
          kubectl create secret generic claude-api-secret \
            --from-literal=CLAUDE_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            -n okla --dry-run=client -o yaml | kubectl apply -f -

          echo "✅ All secrets created from GitHub Secrets (no hardcoded values)"

      - name: ⚙️ Apply ConfigMaps
        run: |
          kubectl apply -f k8s/configmaps.yaml

      - name: �️ Remove in-cluster PostgreSQL (DO Managed DB is used instead)
        run: |
          # Production uses DO Managed PostgreSQL — remove the in-cluster postgres-0
          # --ignore-not-found=true ensures idempotency (safe to run multiple times)
          kubectl delete statefulset postgres -n okla --ignore-not-found=true
          kubectl delete service postgres -n okla --ignore-not-found=true
          kubectl delete configmap postgres-init-script -n okla --ignore-not-found=true
          # Delete PVC only if StatefulSet no longer exists (data already on DO Managed DB)
          kubectl delete pvc data-postgres-0 -n okla --ignore-not-found=true
          echo "✅ In-cluster PostgreSQL removed — using DO Managed DB"

      - name: 🗄️ Deploy Infrastructure (Redis + RabbitMQ)
        run: |
          echo "🗄️ Deploying infrastructure (Redis + RabbitMQ)..."
          kubectl apply -f k8s/infrastructure.yaml

          echo "⏳ Waiting for Redis to be ready..."
          kubectl rollout status deployment/redis -n okla --timeout=60s || true

          echo "⏳ Waiting for RabbitMQ to be ready..."
          kubectl rollout status deployment/rabbitmq -n okla --timeout=120s || true

          echo "⏳ Waiting for infrastructure initialization..."
          sleep 10

      - name: Deploy services
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          # Use GHCR OCI API instead of docker login to check image existence.
          # docker login fails on macOS self-hosted runners because the credential
          # helper tries to store in Keychain, which is non-interactive (-25308).
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          SERVICES="${{ needs.prepare.outputs.services }}"
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          OWNER="${{ github.repository_owner }}"

          echo "🚀 Applying all deployments..."
          kubectl apply -f k8s/deployments.yaml

          # Deploy ChatbotService + LLM Server (separate manifest)
          echo "🤖 Applying ChatbotService + LLM Server..."
          # Fix: remove value-based env vars that conflict with valueFrom in the YAML.
          kubectl set env deployment/chatbotservice \
            LlmService__ApiKey- \
            -n okla 2>/dev/null || true
          kubectl apply -f k8s/chatbotservice.yaml

          # Pin each service image to the immutable SHA tag ONLY if that image exists
          # in GHCR. CI builds images only for services with code changes — services
          # whose code did not change will NOT have an image for the current SHA, and
          # blindly pinning them causes ImagePullBackOff → rollout failure.
          #
          # Check via GHCR OCI API (no docker daemon / keychain needed):
          #   curl -u "user:PAT" https://ghcr.io/v2/{owner}/{image}/manifests/{tag}
          #   Returns 200 if image exists, 404/401 otherwise.
          echo "📌 Pinning images to immutable tag: $IMAGE_TAG (skipping if not built)"
          PINNED=""
          SKIPPED=""
          FAILED_PINS=""
          for SERVICE in $(echo $SERVICES | tr ',' ' '); do
            IMAGE_NAME="$SERVICE"
            FULL_IMAGE="$REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
            API_URL="https://ghcr.io/v2/${OWNER}/${IMAGE_NAME}/manifests/${IMAGE_TAG}"

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${OWNER}:${GHCR_TOKEN}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json" \
              "$API_URL")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "  🏷️  $SERVICE → $FULL_IMAGE"
              if ! kubectl set image deployment/$SERVICE \
                $SERVICE=$FULL_IMAGE \
                -n okla 2>&1; then
                echo "  ⚠️ Failed to pin $SERVICE — deployment may not exist"
                FAILED_PINS="$FAILED_PINS $SERVICE"
              else
                PINNED="$PINNED $SERVICE"
              fi
            else
              echo "  ⏭️  $SERVICE — no image for $IMAGE_TAG (HTTP $HTTP_STATUS, not rebuilt), keeping current"
              SKIPPED="$SKIPPED $SERVICE"
            fi
          done

          # Use if/then to avoid set -e killing the script on empty vars
          if [ -n "$PINNED" ]; then echo "::notice::Pinned to $IMAGE_TAG:$PINNED"; fi
          if [ -n "$SKIPPED" ]; then echo "::notice::Skipped (no new build):$SKIPPED"; fi
          if [ -n "$FAILED_PINS" ]; then echo "::warning::Failed to pin:$FAILED_PINS"; fi
          echo "✅ Image pinning complete"

      - name: 📡 Apply Services
        run: |
          kubectl apply -f k8s/services.yaml

      - name: 🌐 Apply Ingress
        run: |
          kubectl apply -f k8s/ingress.yaml

      - name: 🗄️ Apply Backup CronJob
        continue-on-error: true
        run: |
          echo "🗄️ Applying backup & disaster recovery manifests..."
          kubectl apply -f k8s/backup.yaml
          echo "✅ Backup CronJob scheduled (daily at 3:00 AM RD / 7:00 AM UTC)"

      - name: ⏳ Wait for rollout
        continue-on-error: true
        run: |
          SERVICES="${{ needs.prepare.outputs.services }}"
          ROLLOUT_ISSUES=""

          for SERVICE in $(echo $SERVICES | tr ',' ' '); do
            echo "⏳ Waiting for $SERVICE rollout..."
            if ! kubectl rollout status deployment/$SERVICE -n okla --timeout=300s 2>&1; then
              echo "  ⚠️ $SERVICE rollout issue — may still be starting, continuing"
              ROLLOUT_ISSUES="$ROLLOUT_ISSUES $SERVICE"
            fi
          done

          # LLM Server needs extra time to load the model (~4.5GB)
          echo "⏳ Waiting for LLM Server rollout (model loading)..."
          kubectl rollout status deployment/llm-server -n okla --timeout=600s 2>&1 || true

          if [ -n "$ROLLOUT_ISSUES" ]; then
            echo "::warning::Rollout issues (non-fatal):$ROLLOUT_ISSUES"
          fi

      - name: ✅ Verify deployment
        run: |
          echo "## 📊 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get all pods
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n okla >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Get all services
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n okla >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Get ingress
          echo "### Ingress" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n okla >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 🔔 Notify deployment on Slack
        if: always()
        uses: ./.github/actions/slack-notify-failure
        continue-on-error: true
        with:
          stage-name: "Deploy to ${{ needs.prepare.outputs.environment }} — v${{ needs.prepare.outputs.version }}"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # Health Check
  # ============================================
  health-check:
    name: 🏥 Health Check
    needs: [prepare, deploy]
    runs-on: [self-hosted, macOS, ARM64]
    if: success()

    steps:
      - name: 🏥 Check endpoints
        run: |
          ENV="${{ needs.prepare.outputs.environment }}"

          if [ "$ENV" == "production" ]; then
            FRONTEND_URL="https://okla.do"
            API_URL="https://api.okla.do"
          else
            FRONTEND_URL="https://staging.okla.do"
            API_URL="https://api-staging.okla.do"
          fi

          echo "🔍 Checking $FRONTEND_URL..."
          curl -sf "$FRONTEND_URL/health" || echo "⚠️ Frontend health check failed"

          # NOTE: API Gateway is internal-only (BFF pattern) — no external URL to check.
          # The gateway health is validated via the frontend's /api routes which proxy to it.
          echo "✅ API Gateway is internal-only (BFF) — health verified via frontend proxy"

      - name: 📊 Summary
        run: |
          echo "## ✅ Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.prepare.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URLs" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.prepare.outputs.environment }}" == "production" ]; then
            echo "- Frontend: https://okla.do" >> $GITHUB_STEP_SUMMARY
            echo "- API: https://api.okla.do" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Frontend: https://staging.okla.do" >> $GITHUB_STEP_SUMMARY
            echo "- API: https://api-staging.okla.do" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # Post-Deploy Smoke Test
  # ============================================
  smoke-test:
    name: 🔥 Post-Deploy Smoke Test
    needs: [prepare, health-check]
    if: success()
    # load-test.yml declares permissions: issues:write (for scheduled failure alerts).
    # A reusable workflow can only use permissions its caller explicitly grants.
    # https://docs.github.com/en/actions/sharing-automations/reusing-workflows#supported-keywords
    permissions:
      contents: read
      issues: write
    uses: ./.github/workflows/load-test.yml
    with:
      test_type: smoke
      base_url: ${{ needs.prepare.outputs.environment == 'production' && 'https://api.okla.do' || 'https://api-staging.okla.do' }}
    secrets: inherit

  # ============================================
  # Post-Deploy E2E Tests (Playwright — Staging)
  # ============================================
  # Stage 5: Full E2E test suite against staging environment.
  # Runs AFTER smoke tests pass, BEFORE image integrity checks.
  # A failure triggers automatic rollback.
  # ============================================
  e2e-tests:
    name: 🎭 E2E Tests (Staging)
    needs: [prepare, smoke-test]
    if: success()
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Install dependencies
        working-directory: frontend/web-next
        run: pnpm install --frozen-lockfile

      - name: 🎭 Install Playwright browsers
        working-directory: frontend/web-next
        run: pnpm exec playwright install chromium

      - name: 🎭 Run E2E test suite against staging
        working-directory: frontend/web-next
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.prepare.outputs.environment == 'production' && 'https://okla.do' || 'https://staging.okla.do' }}
          API_BASE_URL: ${{ needs.prepare.outputs.environment == 'production' && 'https://api.okla.do' || 'https://api-staging.okla.do' }}
          CI: "true"
        run: |
          echo "🎭 Running E2E tests against $PLAYWRIGHT_BASE_URL..."
          pnpm exec playwright test e2e/ \
            --config=playwright.prod.config.ts \
            --reporter=line \
            --timeout=60000 \
            --retries=1

      - name: 📤 Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: frontend/web-next/test-results/
          retention-days: 14

      - name: 📊 E2E test summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ E2E Tests — All passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ E2E Tests — FAILED" >> $GITHUB_STEP_SUMMARY
            echo "> **Automatic rollback will be triggered.**" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # Post-Deploy Image Integrity Smoke Test (Playwright)
  # ============================================
  image-smoke-test:
    name: 📸 Image Integrity Smoke Test
    needs: [prepare, e2e-tests]
    if: success()
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Install dependencies
        working-directory: frontend/web-next
        run: pnpm install --frozen-lockfile

      - name: 🎭 Install Playwright browsers
        working-directory: frontend/web-next
        run: pnpm exec playwright install chromium

      - name: 📸 Run image integrity smoke test
        working-directory: frontend/web-next
        env:
          API_BASE_URL: ${{ needs.prepare.outputs.environment == 'production' && 'https://api.okla.do' || 'https://api-staging.okla.do' }}
          PLAYWRIGHT_BASE_URL: ${{ needs.prepare.outputs.environment == 'production' && 'https://okla.do' || 'https://staging.okla.do' }}
        run: |
          echo "📸 Running image integrity smoke test against $API_BASE_URL..."
          pnpm exec playwright test e2e/post-deploy-image-smoke.spec.ts \
            --config=playwright.prod.config.ts \
            --reporter=line \
            --timeout=120000

      - name: 📊 Image smoke test summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Image Integrity — All images validated" >> $GITHUB_STEP_SUMMARY
            echo "All CDN images from recent listings passed HTTP 200, Content-Type, and size checks." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Image Integrity — FAILED" >> $GITHUB_STEP_SUMMARY
            echo "> More than 20% of listing images are broken/unreachable." >> $GITHUB_STEP_SUMMARY
            echo "> **Automatic rollback will be triggered.**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-smoke-test-results
          path: frontend/web-next/test-results/
          retention-days: 7

  # ============================================
  # Rollback (on deploy or smoke test failure)
  # ============================================
  rollback:
    name: ⏪ Rollback
    runs-on: [self-hosted, macOS, ARM64]
    if: failure()
    needs: [prepare, deploy, smoke-test, e2e-tests, image-smoke-test]
    environment: ${{ needs.prepare.outputs.environment }}

    steps:
      - name: � Checkout
        uses: actions/checkout@v4

      - name: �🔧 Authenticate doctl
        run: |
          doctl auth init --access-token ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: 🔐 Configure Kubernetes
        run: |
          doctl kubernetes cluster kubeconfig save ${{ secrets.DO_CLUSTER_NAME }}

      - name: ⏪ Rollback deployments
        run: |
          SERVICES="${{ needs.prepare.outputs.services }}"

          for SERVICE in $(echo $SERVICES | tr ',' ' '); do
            echo "⏪ Rolling back $SERVICE..."
            kubectl rollout undo deployment/$SERVICE -n okla || true
          done

      - name: 📊 Rollback summary
        run: |
          echo "## ⏪ Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rolled back to previous version due to deployment failure, smoke test failure, or image integrity check failure." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Possible causes:" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment failed (pods not running)" >> $GITHUB_STEP_SUMMARY
          echo "- k6 smoke test failed (API endpoints unreachable/slow)" >> $GITHUB_STEP_SUMMARY
          echo "- Image integrity test failed (>20% of CDN images broken)" >> $GITHUB_STEP_SUMMARY

      - name: 🔔 Notify rollback on Slack
        uses: ./.github/actions/slack-notify-failure
        continue-on-error: true
        with:
          stage-name: "⏪ ROLLBACK — ${{ needs.prepare.outputs.environment }}"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
