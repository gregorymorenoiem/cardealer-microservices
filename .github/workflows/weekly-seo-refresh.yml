name: Weekly SEO Content Refresh

on:
  schedule:
    # Every Monday at 10:00 UTC (06:00 AST)
    - cron: "0 10 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/web-next/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend/web-next
        run: pnpm install --frozen-lockfile

      - name: Run weekly SEO refresh
        working-directory: frontend/web-next
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
        run: pnpm tsx scripts/weekly-seo-refresh.ts
