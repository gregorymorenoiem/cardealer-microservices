# =============================================================================
# UserService CI Pipeline (Seller Conversion + Dealer Registration)
# =============================================================================
# Validates UserService features:
#   - Buyer→Seller conversion
#   - Dealer company registration + admin approval
#   1. Build UserService (.NET 8)
#   2. Run unit + integration tests
#   3. Migration dry-run (EF Core)
#   4. Build Docker image (optional push)
# =============================================================================

name: 🔄 UserService CI

on:
  push:
    branches: [main]
    paths:
      - "backend/UserService/**"
      - "backend/_Shared/**"
      - "k8s/deployments.yaml"
  pull_request:
    branches: [main]
    paths:
      - "backend/UserService/**"
      - "backend/_Shared/**"
  workflow_dispatch:
    inputs:
      run_migration:
        description: "Generate migration SQL script"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: seller-conversion-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/userservice

jobs:
  # ============================================
  # JOB 1: Build & Unit Tests
  # ============================================
  build-and-test:
    name: 🔨 Build & Test
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: 📦 Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 📥 Restore dependencies
        working-directory: backend/UserService
        run: dotnet restore

      - name: 🔨 Build
        working-directory: backend/UserService
        run: dotnet build --no-restore --configuration Release

      - name: 🧪 Run Unit Tests
        working-directory: backend/UserService
        run: |
          dotnet test UserService.Tests/UserService.Tests.csproj \
            --configuration Release \
            --verbosity normal \
            --filter "FullyQualifiedName!~.Integration." \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/UserService/TestResults/

  # ============================================
  # JOB 2: Migration Dry Run (optional)
  # ============================================
  migration-check:
    name: 🗄️ Migration Check
    runs-on: [self-hosted, macOS, ARM64]
    needs: build-and-test
    if: github.event.inputs.run_migration == 'true' || github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: 📦 Install EF Core Tools
        run: dotnet tool install --global dotnet-ef --version 8.0.*

      - name: 📥 Restore
        working-directory: backend/UserService
        run: dotnet restore

      - name: 🗄️ Generate Idempotent SQL Script
        working-directory: backend/UserService
        run: |
          dotnet ef migrations script \
            --idempotent \
            --project UserService.Infrastructure \
            --startup-project UserService.Api \
            --output migration-seller-conversion.sql \
            || echo "⚠️ Migration script generation failed (may need manual review)"

      - name: 📊 Upload Migration Script
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-script
          path: backend/UserService/migration-seller-conversion.sql

  # ============================================
  # JOB 3: Docker Build & Push
  # ============================================
  docker:
    name: 🐳 Docker Build
    runs-on: [self-hosted, macOS, ARM64]
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: "🗑️ Create CI Docker config (bypass macOS Keychain)"
        run: |
          rm -f ~/.docker/cli-plugins/docker-buildx
          CI_CFG=$(mktemp -d)
          jq '. + {"credsStore": "", "credHelpers": {}}' "$HOME/.docker/config.json" \
            > "$CI_CFG/config.json" 2>/dev/null \
            || printf '{"auths":{},"credsStore":"","credHelpers":{}}' > "$CI_CFG/config.json"
          echo "DOCKER_CONFIG=$CI_CFG" >> "$GITHUB_ENV"

      - name: 🩺 Ensure Docker daemon is running (Colima)
        timeout-minutes: 6
        run: |
          COLIMA_BIN="/opt/homebrew/bin/colima"
          COLIMA_SOCKET="$HOME/.colima/default/docker.sock"
          export DOCKER_HOST="unix://$COLIMA_SOCKET"
          echo "DOCKER_HOST=unix://$COLIMA_SOCKET" >> "$GITHUB_ENV"
          if docker version > /dev/null 2>&1; then
            echo "✅ Docker daemon is healthy"
            exit 0
          fi
          echo "⚠️ Docker not responding. Starting Colima..."
          [ -x "$COLIMA_BIN" ] && "$COLIMA_BIN" start 2>&1 | head -30 || true
          for i in $(seq 1 36); do
            sleep 5
            if docker version > /dev/null 2>&1; then
              echo "✅ Docker ready after $((i*5))s"
              exit 0
            fi
            [ $i -eq 36 ] && echo "::error::Docker daemon timeout" && exit 1
            echo "  Waiting... $((i*5))s / 180s"
          done

      - name: "🐳 Pre-pull buildkit image (avoids Docker Hub auth in buildx create)"
        run: |
          if docker image inspect moby/buildkit:buildx-stable-1 > /dev/null 2>&1; then
            echo "✅ moby/buildkit:buildx-stable-1 already cached"
          else
            echo "⚠️ Pulling moby/buildkit anonymously..."
            ANON_CFG=$(mktemp -d)
            printf '{"auths":{}}' > "$ANON_CFG/config.json"
            DOCKER_CONFIG="$ANON_CFG" docker pull moby/buildkit:buildx-stable-1
          fi

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver-opts: |
            network=host

      - name: "🔐 Reset Docker config post-buildx"
        run: |
          jq '. + {"credsStore": "", "credHelpers": {}}' "$DOCKER_CONFIG/config.json" \
            > /tmp/dc_reset.json && mv /tmp/dc_reset.json "$DOCKER_CONFIG/config.json" \
            || printf '{"auths":{},"credsStore":"","credHelpers":{}}' > "$DOCKER_CONFIG/config.json"

      - name: "🔐 Login to GHCR (manual auth)"
        run: |
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          USER="${{ github.actor }}"
          AUTH=$(printf "%s:%s" "$USER" "$TOKEN" | base64 | tr -d '\n')
          jq --arg auth "$AUTH" '.auths["ghcr.io"] = {"auth": $auth}' \
            "$DOCKER_CONFIG/config.json" > /tmp/dc_auth.json \
            && mv /tmp/dc_auth.json "$DOCKER_CONFIG/config.json"
          echo "✅ Logged into ghcr.io (credentials written to config.json auths)"

      - name: 🐳 Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/UserService/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
