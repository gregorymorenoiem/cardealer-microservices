# =============================================================================
# Gitleaks Configuration - OKLA Microservices
# Custom rules for detecting secrets specific to our tech stack
# =============================================================================

title = "OKLA Gitleaks Config"

[allowlist]
  description = "Global allowlist"
  paths = [
    '''node_modules''',
    '''\.git''',
    '''bin/Debug''',
    '''bin/Release''',
    '''obj/''',
    '''_DESCARTADOS/''',
    '''\.github/copilot-instructions\.md''',
    '''\.gitleaks\.toml''',
    '''\.gitleaksignore''',
    '''docs/SAST-FALSE-POSITIVES\.md''',
    '''appsettings\.Production\.json''',
    '''appsettings\.Staging\.json''',
    '''k8s/''',
    '''helm/''',
    '''\.bak_\d{8}_\d{6}$''',
    '''pnpm-lock\.yaml''',
  ]
  regexTarget = "match"
  regexes = [
    # Allow placeholder env var patterns
    '''\$\{[A-Z_]+\}''',
    # Allow development defaults that are not real secrets
    '''Password=postgres''',
    '''Password=password''',
    '''Password=devpassword''',
    '''Password=guest''',
    '''clave-super-secreta-desarrollo''',
  ]

[[rules]]
  id = "sendgrid-api-key"
  description = "SendGrid API Key"
  regex = '''SG\.[a-zA-Z0-9_-]{22,}\.[a-zA-Z0-9_-]{22,}'''
  tags = ["api-key", "sendgrid"]

[[rules]]
  id = "resend-api-key"
  description = "Resend API Key"
  regex = '''re_[a-zA-Z0-9]{20,}'''
  tags = ["api-key", "resend"]

[[rules]]
  id = "stripe-secret-key"
  description = "Stripe Secret Key"
  regex = '''sk_(live|test)_[a-zA-Z0-9]{20,}'''
  tags = ["api-key", "stripe"]

[[rules]]
  id = "twilio-account-sid"
  description = "Twilio Account SID"
  regex = '''AC[a-f0-9]{32}'''
  tags = ["api-key", "twilio"]

[[rules]]
  id = "jwt-hardcoded-key"
  description = "Hardcoded JWT signing key (non-placeholder)"
  regex = '''["']([A-Za-z0-9+/=]{32,})["']'''
  tags = ["jwt", "secret"]
  [rules.allowlist]
    paths = [
      '''pyproject\.toml''',
    ]
    regexes = [
      '''\$\{''',
      '''clave-super-secreta''',
    ]

[[rules]]
  id = "connection-string-password"
  description = "Database connection string with real password"
  # Note: go-re2 does NOT support lookaheads/lookbehinds. Use allowlist regexes instead.
  regex = '''Password=[^\s;]{4,}'''
  tags = ["database", "password"]
  [rules.allowlist]
    paths = [
      '''appsettings\.Development\.json''',
      '''appsettings\.Docker\.json''',
    ]
    regexes = [
      '''Password=postgres''',
      '''Password=password''',
      '''Password=devpassword''',
      '''Password=guest''',
      '''\$\{[A-Z_]+\}''',
    ]

[[rules]]
  id = "digitalocean-token"
  description = "DigitalOcean Personal Access Token"
  regex = '''dop_v1_[a-f0-9]{64}'''
  tags = ["api-key", "digitalocean"]

[[rules]]
  id = "anthropic-api-key"
  description = "Anthropic/Claude API Key"
  regex = '''sk-ant-[a-zA-Z0-9_-]{80,}'''
  tags = ["api-key", "anthropic"]

[[rules]]
  id = "openai-api-key"
  description = "OpenAI API Key"
  regex = '''sk-[a-zA-Z0-9]{40,}'''
  tags = ["api-key", "openai"]
  [rules.allowlist]
    regexes = [
      '''sk_(live|test)_''',
      '''sk-ant-''',
    ]

[[rules]]
  id = "generic-high-entropy-secret"
  description = "Generic secret assignment with high-entropy value"
  regex = '''(?i)(secret|api_key|apikey|token|password|passwd)[\s]*[=:]+[\s]*["']([A-Za-z0-9+/=_-]{20,})["']'''
  tags = ["generic", "secret"]
  [rules.allowlist]
    regexes = [
      '''\$\{''',
      '''clave-super-secreta''',
      '''Password=postgres''',
      '''Password=password''',
      '''Password=devpassword''',
      '''Password=guest''',
    ]
    paths = [
      '''appsettings\.Development\.json''',
      '''appsettings\.Docker\.json''',
      '''\.env\.example''',
    ]
