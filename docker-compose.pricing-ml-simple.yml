version: '3.8'

services:
  # ML Pricing Service (Python FastAPI)
  pricing-ml-service:
    build:
      context: ./backend/PricingAgent.ML/
      dockerfile: Dockerfile
    container_name: okla-pricing-ml
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - MODEL_PATH=/app/models
      - DATA_PATH=/app/data
      - LOG_LEVEL=INFO
    ports:
      - "8080:8080"
    volumes:
      - ./backend/PricingAgent.ML/models:/app/models
      - ./backend/PricingAgent.ML/data:/app/data
      - ./backend/PricingAgent.ML/logs:/app/logs
    networks:
      - cardealer-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Pricing Analytics Dashboard
  pricing-dashboard:
    build:
      context: ./backend/PricingAgent.ML/dashboard/
      dockerfile: Dockerfile
    container_name: okla-pricing-dashboard
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - ML_SERVICE_URL=http://pricing-ml-service:8080
    ports:
      - "8501:8501"
    volumes:
      - ./backend/PricingAgent.ML/dashboard/data:/app/data
    networks:
      - cardealer-network
    depends_on:
      - pricing-ml-service

networks:
  cardealer-network:
    external: true