version: '3.8'

services:
  # ML Pricing Service (Python FastAPI)
  pricing-ml-service:
    build:
      context: ./backend/PricingAgent.ML/
      dockerfile: Dockerfile
    container_name: okla-pricing-ml
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - MODEL_PATH=/app/models
      - DATA_PATH=/app/data
      - RABBITMQ_HOST=rabbitmq
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - LOG_LEVEL=INFO
    ports:
      - "8080:8080"
    volumes:
      - ./backend/PricingAgent.ML/models:/app/models
      - ./backend/PricingAgent.ML/data:/app/data
      - ./backend/PricingAgent.ML/logs:/app/logs
    networks:
      - cardealer-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Enhanced PricingAgent Service (.NET)
  pricing-agent-enhanced:
    build:
      context: ./backend/PricingAgent/
      dockerfile: Dockerfile.enhanced
    container_name: okla-pricing-agent-enhanced
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=pricingagent;Username=oklauser;Password=${POSTGRES_PASSWORD}
      - MLPricingService__BaseUrl=http://pricing-ml-service:8080
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - Redis__ConnectionString=redis:6379
      - Jwt__Secret=${JWT__KEY}
      - ExternalAPIs__ExchangeRateAPI=https://api.exchangerate-api.com/v4/latest/USD
      - ExternalAPIs__SuperCarrosAPI=https://supercarros.com/api
      - Logging__LogLevel__Default=Information
      - Sentry__Dsn=${SENTRY_DSN}
    ports:
      - "5170:8080"
    volumes:
      - ./logs/pricing-agent:/app/logs
    networks:
      - cardealer-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - pricing-ml-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Market Intelligence Worker (Web Scraping)
  market-intelligence:
    build:
      context: ./backend/PricingAgent.ML/
      dockerfile: Dockerfile
      args:
        - WORKER_TYPE=scraper
    container_name: okla-market-intelligence
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=pricingagent
      - POSTGRES_USER=oklauser
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - SCRAPING_INTERVAL=3600  # 1 hora
      - USER_AGENT=Mozilla/5.0 (compatible; OKLABot/1.0)
      - PROXY_ENABLED=false
      - RESPECT_ROBOTS_TXT=true
    volumes:
      - ./backend/PricingAgent.ML/scraped-data:/app/scraped-data
      - ./backend/PricingAgent.ML/logs:/app/logs
    networks:
      - cardealer-network
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Pricing Analytics Dashboard
  pricing-dashboard:
    build:
      context: ./backend/PricingAgent.ML/dashboard/
      dockerfile: Dockerfile
    container_name: okla-pricing-dashboard
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=pricingagent
      - POSTGRES_USER=oklauser
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ML_SERVICE_URL=http://pricing-ml-service:8080
    ports:
      - "8501:8501"
    volumes:
      - ./backend/PricingAgent.ML/dashboard/data:/app/data
    networks:
      - cardealer-network
    depends_on:
      - postgres
      - pricing-ml-service

networks:
  cardealer-network:
    external: true

volumes:
  pricing_models:
    driver: local
  pricing_data:
    driver: local
  pricing_logs:
    driver: local