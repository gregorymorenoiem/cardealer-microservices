global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "cluster", "service"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: "default"
  routes:
    # ── LLM COST ALERTS → CTO (fastest path, 0s group_wait) ────────────
    - match:
        team: cto
      receiver: "cto-alerts"
      group_wait: 0s # Zero wait — CTO SLA < 5 minutes
      group_interval: 5m
      repeat_interval: 1h # Re-alert every hour while threshold exceeded
      continue: false # Don't send CTO alerts to other receivers

    # ── LLM COST WARNING → Admin + Platform team ───────────────────────
    - match:
        alert_type: api_cost_warning
      receiver: "cost-warning"
      group_wait: 0s
      repeat_interval: 6h
      continue: true # Also send to default for logging

    # ── INFRA COST WARNING → Admin + Platform team (CONTRA #8) ─────────
    - match:
        alert_type: infra_cost_warning
      receiver: "cost-warning"
      group_wait: 0s
      repeat_interval: 6h
      continue: true

    # ── INFRA COST PROJECTED OVERRUN → Platform team ───────────────────
    - match:
        alert_type: infra_cost_projected
      receiver: "cost-warning"
      group_wait: 0s
      repeat_interval: 12h
      continue: true

    - match:
        severity: critical
      receiver: "critical"
      continue: true

    # ── K8S PLATFORM ALERTS → Slack tech team (CrashLoopBackOff, restarts) ─
    - match:
        team: platform
      receiver: "platform-slack"
      group_wait: 0s
      group_interval: 5m
      repeat_interval: 30m
      continue: true

    - match:
        severity: warning
      receiver: "warning"

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://localhost:5001/webhook"
        send_resolved: true

  - name: "critical"
    webhook_configs:
      - url: "http://localhost:5001/webhook/critical"
        send_resolved: true

  - name: "warning"
    webhook_configs:
      - url: "http://localhost:5001/webhook/warning"
        send_resolved: true

  # ── CTO ALERTS: Email + SMS + Teams + Slack ──────────────────────────
  # SLA: < 5 minutes from threshold breach to CTO notification
  # Pipeline: Prometheus 15s scrape → 0s group_wait → webhook → multi-channel
  - name: "cto-alerts"
    webhook_configs:
      - url: "http://notificationservice:80/api/alerts/cto"
        send_resolved: true
        http_config:
          bearer_token: "${CTO_ALERT_BEARER_TOKEN}"

  # ── COST WARNING: Admin notification ─────────────────────────────────
  - name: "cost-warning"
    webhook_configs:
      - url: "http://notificationservice:80/api/alerts/cost-warning"
        send_resolved: true

  # ── PLATFORM ALERTS: Slack tech team channel ─────────────────────────
  # Receives CrashLoopBackOff, FrequentRestarts, OOMKilled, DeploymentDown
  # Slack webhook URL is injected via K8s secret / env var
  - name: "platform-slack"
    slack_configs:
      - api_url: "${SLACK_PLATFORM_WEBHOOK_URL}"
        channel: "#platform-alerts"
        send_resolved: true
        title: '{{ template "slack.default.title" . }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }} — {{ .Labels.severity | toUpper }}
          *Pod:* {{ .Labels.pod }}
          *Namespace:* {{ .Labels.namespace }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    webhook_configs:
      - url: "http://notificationservice:80/api/alerts/platform"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "cluster", "service"]
  # LlmCostEmergency inhibits LlmCostCritical (already implies it)
  - source_match:
      alert_type: "api_cost_emergency"
    target_match:
      alert_type: "api_cost_critical"
    equal: ["service"]
  # InfraCostEmergency inhibits InfraCostCritical (CONTRA #8)
  - source_match:
      alert_type: "infra_cost_emergency"
    target_match:
      alert_type: "infra_cost_critical"
    equal: ["service"]
