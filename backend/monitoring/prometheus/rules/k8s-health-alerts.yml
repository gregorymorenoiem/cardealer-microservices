# ═══════════════════════════════════════════════════════════════════════════════
# Kubernetes Health & Auto-Healing Alert Rules
# CarDealer Microservices — DOKS (DigitalOcean Kubernetes)
# Created: 2026-03-09
#
# Purpose:
#   - Detect CrashLoopBackOff pods (10 min threshold → Slack alert)
#   - Detect pods restarting >3 times in 5 minutes → critical alert
#   - Detect OOMKilled containers
#   - Detect pending/unschedulable pods
#   - Detect failed health probes
# ═══════════════════════════════════════════════════════════════════════════════
groups:
  - name: k8s-pod-health
    interval: 15s
    rules:
      # ── CrashLoopBackOff for 10+ minutes → Slack alert to tech team ────────
      - alert: PodCrashLoopBackOff
        expr: |
          max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff", namespace="cardealer"}[1m]) == 1
        for: 10m
        labels:
          severity: critical
          team: platform
          alert_type: crashloop
        annotations:
          summary: "🔴 CrashLoopBackOff: {{ $labels.pod }} ({{ $labels.namespace }})"
          description: >-
            Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been in
            CrashLoopBackOff for more than 10 minutes. Container: {{ $labels.container }}.
            Immediate investigation required — the service is DOWN.
          runbook: "1. kubectl logs {{ $labels.pod }} -n {{ $labels.namespace }} --previous 2. kubectl describe pod {{ $labels.pod }} -n {{ $labels.namespace }} 3. Check recent deployments"

      # ── Pod restarting >3 times in 5 minutes → auto-healing trigger ────────
      - alert: PodFrequentRestarts
        expr: |
          increase(kube_pod_container_status_restarts_total{namespace="cardealer"}[5m]) > 3
        for: 0m
        labels:
          severity: critical
          team: platform
          alert_type: frequent_restarts
        annotations:
          summary: '⚠️ Frequent restarts: {{ $labels.pod }} ({{ $labels.container }}) — {{ $value | printf "%.0f" }} restarts in 5 min'
          description: >-
            Pod {{ $labels.pod }} container {{ $labels.container }} has restarted
            {{ $value | printf "%.0f" }} times in the last 5 minutes (threshold: 3).
            Auto-healing may require rollback to previous deployment revision.
          runbook: "1. kubectl rollout history deployment/{{ $labels.container }} -n {{ $labels.namespace }} 2. kubectl rollout undo deployment/{{ $labels.container }} -n {{ $labels.namespace }}"

      # ── OOMKilled containers → memory limit too low ────────────────────────
      - alert: ContainerOOMKilled
        expr: |
          kube_pod_container_status_last_terminated_reason{reason="OOMKilled", namespace="cardealer"} == 1
        for: 0m
        labels:
          severity: critical
          team: platform
          alert_type: oomkill
        annotations:
          summary: "💀 OOMKilled: {{ $labels.pod }}/{{ $labels.container }}"
          description: >-
            Container {{ $labels.container }} in pod {{ $labels.pod }} was OOMKilled.
            Current memory limit may be insufficient. Check resource requests/limits.
          runbook: "1. kubectl describe pod {{ $labels.pod }} -n {{ $labels.namespace }} 2. Increase memory limits in deployment manifest"

      # ── Pod stuck in Pending state → scheduling issues ─────────────────────
      - alert: PodStuckPending
        expr: |
          kube_pod_status_phase{phase="Pending", namespace="cardealer"} == 1
        for: 10m
        labels:
          severity: warning
          team: platform
          alert_type: scheduling
        annotations:
          summary: "⏳ Pod stuck Pending: {{ $labels.pod }}"
          description: >-
            Pod {{ $labels.pod }} has been in Pending state for more than 10 minutes.
            Possible causes: insufficient resources, node affinity/taint issues, or PVC binding.
          runbook: "1. kubectl describe pod {{ $labels.pod }} -n {{ $labels.namespace }} 2. kubectl get events -n {{ $labels.namespace }} --field-selector involvedObject.name={{ $labels.pod }}"

      # ── Pod not ready (liveness/readiness probe failures) ──────────────────
      - alert: PodNotReady
        expr: |
          min_over_time(kube_pod_status_ready{condition="true", namespace="cardealer"}[5m]) == 0
        for: 5m
        labels:
          severity: warning
          team: platform
          alert_type: probe_failure
        annotations:
          summary: "🟡 Pod not ready: {{ $labels.pod }}"
          description: >-
            Pod {{ $labels.pod }} has not been ready for 5 minutes. Health probes
            may be failing. Check /health/ready and /health/live endpoints.

  - name: k8s-deployment-health
    interval: 30s
    rules:
      # ── Deployment has zero available replicas ─────────────────────────────
      - alert: DeploymentReplicasUnavailable
        expr: |
          kube_deployment_status_replicas_available{namespace="cardealer"} == 0
          and kube_deployment_spec_replicas{namespace="cardealer"} > 0
        for: 5m
        labels:
          severity: critical
          team: platform
          alert_type: deployment_down
        annotations:
          summary: "🔴 Deployment DOWN: {{ $labels.deployment }} — 0 replicas available"
          description: >-
            Deployment {{ $labels.deployment }} has 0 available replicas out of
            {{ with printf "kube_deployment_spec_replicas{deployment='%s', namespace='%s'}" $labels.deployment $labels.namespace | query }}{{ . | first | value }}{{ end }} desired.
            Service is completely unavailable.

      # ── Deployment rollout stuck ───────────────────────────────────────────
      - alert: DeploymentRolloutStuck
        expr: |
          kube_deployment_status_observed_generation{namespace="cardealer"}
          != kube_deployment_metadata_generation{namespace="cardealer"}
        for: 15m
        labels:
          severity: warning
          team: platform
          alert_type: rollout_stuck
        annotations:
          summary: "🔄 Rollout stuck: {{ $labels.deployment }}"
          description: >-
            Deployment {{ $labels.deployment }} rollout has been stuck for 15 minutes.
            The observed generation does not match the desired generation.

      # ── HPA at max replicas for extended time ──────────────────────────────
      - alert: HPAMaxedOut
        expr: |
          kube_horizontalpodautoscaler_status_current_replicas{namespace="cardealer"}
          == kube_horizontalpodautoscaler_spec_max_replicas{namespace="cardealer"}
        for: 30m
        labels:
          severity: warning
          team: platform
          alert_type: scaling_limit
        annotations:
          summary: "📈 HPA maxed out: {{ $labels.horizontalpodautoscaler }}"
          description: >-
            HPA {{ $labels.horizontalpodautoscaler }} has been at maximum replicas
            for 30 minutes. Consider increasing max replicas or optimizing the service.

  - name: k8s-node-health
    interval: 30s
    rules:
      # ── Node not ready ─────────────────────────────────────────────────────
      - alert: KubernetesNodeNotReady
        expr: |
          kube_node_status_condition{condition="Ready", status="true"} == 0
        for: 5m
        labels:
          severity: critical
          team: platform
          alert_type: node_down
        annotations:
          summary: "🔴 K8s Node not ready: {{ $labels.node }}"
          description: >-
            Node {{ $labels.node }} has been in NotReady state for 5 minutes.
            Pods may be evicted and rescheduled.

      # ── Node disk pressure ─────────────────────────────────────────────────
      - alert: KubernetesNodeDiskPressure
        expr: |
          kube_node_status_condition{condition="DiskPressure", status="true"} == 1
        for: 5m
        labels:
          severity: warning
          team: platform
          alert_type: disk_pressure
        annotations:
          summary: "💾 Disk pressure on node: {{ $labels.node }}"
          description: >-
            Node {{ $labels.node }} is under disk pressure. Pods may be evicted.
