# =============================================================================
# BACKUP & DISASTER RECOVERY
# =============================================================================
# Velero-based backup for K8s resources and persistent volumes
# CronJob for PostgreSQL logical backups → DO Spaces (cross-region)
# Last updated: 2026-03-09 — Task 17: Backup/DR audit
# =============================================================================

---
# =============================================================================
# Velero Backup Schedule (requires Velero installed)
# Install: velero install --provider digitalocean --bucket okla-backups \
#   --secret-file ./do-spaces-credentials \
#   --backup-location-config s3Url=https://nyc3.digitaloceanspaces.com,region=nyc3
# =============================================================================
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: okla-daily-backup
  namespace: velero
spec:
  schedule: "0 2 * * *" # Daily at 2:00 AM UTC (10:00 PM RD)
  template:
    includedNamespaces:
      - okla
    includedResources:
      - deployments
      - services
      - configmaps
      - ingresses
      - horizontalpodautoscalers
      - poddisruptionbudgets
      - networkpolicies
      - serviceaccounts
      - roles
      - rolebindings
    excludedResources:
      - secrets # Secrets managed via External Secrets Operator
    storageLocation: default
    ttl: 720h # 30 days retention
    snapshotVolumes: true
  useOwnerReferencesInBackup: false

---
# =============================================================================
# PostgreSQL Backup CronJob
# Schedule: 3:00 AM Santo Domingo (RD) = 7:00 AM UTC (AST = UTC-4)
# Target: All 12 service databases → local PVC + DigitalOcean Spaces (cross-region)
# RPO: 24 hours (daily full backup)
# Retention: 30 days local, 90 days remote (DO Spaces)
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: okla
  labels:
    app: postgres-backup
    tier: infrastructure
    component: disaster-recovery
spec:
  # 7:00 AM UTC = 3:00 AM AST (Santo Domingo, Dominican Republic)
  schedule: "0 7 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 3600 # 1 hour max — prevents hung jobs
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          serviceAccountName: okla-backend
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          containers:
            - name: pg-backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  # Install s3cmd for DO Spaces upload
                  apk add --no-cache python3 py3-pip > /dev/null 2>&1
                  pip3 install --break-system-packages s3cmd > /dev/null 2>&1

                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  DATABASES="authservice userservice roleservice vehiclessaleservice mediaservice billingservice notificationservice errorservice reviewservice adminservice auditservice contactservice"
                  BACKUP_SUCCESS=0
                  BACKUP_TOTAL=0

                  echo "════════════════════════════════════════════════════════════════"
                  echo "🗄️  PostgreSQL Backup — $(date '+%Y-%m-%d %H:%M:%S UTC')"
                  echo "   Host: $POSTGRES_HOST | Databases: $(echo $DATABASES | wc -w)"
                  echo "════════════════════════════════════════════════════════════════"

                  for DB in $DATABASES; do
                    BACKUP_TOTAL=$((BACKUP_TOTAL + 1))
                    BACKUP_FILE="/backups/${DB}_${TIMESTAMP}.dump"
                    echo ""
                    echo "📦 [$BACKUP_TOTAL] Backing up $DB..."

                    if pg_dump -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" \
                      -d "$DB" --format=custom --compress=9 \
                      -f "$BACKUP_FILE" 2>/tmp/pg_err_${DB}.log; then

                      FILE_SIZE=$(ls -lh "$BACKUP_FILE" | awk '{print $5}')
                      echo "   ✅ $DB — $FILE_SIZE"
                      BACKUP_SUCCESS=$((BACKUP_SUCCESS + 1))

                      # Upload to DO Spaces (cross-region: SFO3 when prod is NYC)
                      if [ -n "$DO_SPACES_KEY" ] && [ -n "$DO_SPACES_SECRET" ]; then
                        echo "   ☁️  Uploading to DO Spaces..."
                        s3cmd put "$BACKUP_FILE" \
                          "s3://${DO_SPACES_BUCKET}/postgres/${DB}/${DB}_${TIMESTAMP}.dump" \
                          --host="${DO_SPACES_REGION}.digitaloceanspaces.com" \
                          --host-bucket="%(bucket)s.${DO_SPACES_REGION}.digitaloceanspaces.com" \
                          --access_key="$DO_SPACES_KEY" \
                          --secret_key="$DO_SPACES_SECRET" \
                          --no-mime-magic 2>/tmp/s3_err_${DB}.log && \
                          echo "   ☁️  ✅ Uploaded" || \
                          echo "   ☁️  ⚠️ Upload failed (backup still saved locally)"
                      fi
                    else
                      echo "   ❌ FAILED: $DB — $(cat /tmp/pg_err_${DB}.log 2>/dev/null)"
                    fi
                  done

                  # Cleanup local backups older than 30 days
                  echo ""
                  echo "🧹 Cleaning up local backups older than 30 days..."
                  find /backups -name "*.dump" -mtime +30 -delete 2>/dev/null
                  echo "   ✅ Local cleanup complete"

                  # Summary
                  echo ""
                  echo "════════════════════════════════════════════════════════════════"
                  echo "📊 Backup Summary"
                  echo "   Databases: $BACKUP_SUCCESS/$BACKUP_TOTAL successful"
                  echo "   Timestamp: $TIMESTAMP"
                  echo "════════════════════════════════════════════════════════════════"

                  # Exit with error if any backup failed
                  if [ "$BACKUP_SUCCESS" -ne "$BACKUP_TOTAL" ]; then
                    echo "❌ BACKUP INCOMPLETE — $((BACKUP_TOTAL - BACKUP_SUCCESS)) databases failed"
                    exit 1
                  fi

                  echo "✅ All backups completed successfully"
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: database-secrets
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_HOST
                  valueFrom:
                    secretKeyRef:
                      name: database-secrets
                      key: POSTGRES_HOST
                - name: POSTGRES_PORT
                  valueFrom:
                    secretKeyRef:
                      name: database-secrets
                      key: POSTGRES_PORT
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: database-secrets
                      key: POSTGRES_USER
                # DO Spaces credentials for cross-region backup
                - name: DO_SPACES_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: DO_SPACES_KEY
                      optional: true
                - name: DO_SPACES_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: DO_SPACES_SECRET
                      optional: true
                - name: DO_SPACES_BUCKET
                  value: "okla-dr-backups"
                - name: DO_SPACES_REGION
                  value: "sfo3" # Cross-region: SFO3 when production is NYC1
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
              securityContext:
                runAsNonRoot: true
                runAsUser: 70 # postgres user
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
            - name: tmp
              emptyDir: {}

---
# PVC for local backup storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: okla
  labels:
    app: postgres-backup
    component: disaster-recovery
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 20Gi
