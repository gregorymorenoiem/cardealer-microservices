# =============================================================================
# HORIZONTAL POD AUTOSCALER (HPA) — Arquitectura Auto-Escalable
# =============================================================================
# Auto-scaling basado en CPU + Memory para TODOS los microservicios.
#
# TIERS DE ESCALADO:
#   🔴 CRITICAL: minReplicas=2, maxReplicas=8, CPU 50%, Memory 70%
#   🟠 IMPORTANT: minReplicas=1, maxReplicas=6, CPU 60%, Memory 75%
#   🟡 STANDARD:  minReplicas=1, maxReplicas=4, CPU 70%, Memory 80%
#   🔵 INTERNAL:  minReplicas=1, maxReplicas=3, CPU 75%
#
# SCALE-UP:  Agresivo — max 3 pods cada 30s (respuesta rápida a tráfico)
# SCALE-DOWN: Conservador — max 1 pod cada 60s, stabilization 300s
#
# Para métricas custom (request rate, queue depth) ver keda.yaml
# =============================================================================

---
# ═══════════════════════════════════════════════════════════════════════════
# 🔴 TIER CRITICAL — Alta disponibilidad, escalado agresivo
# ═══════════════════════════════════════════════════════════════════════════

# Frontend Web — Entry point, escala por CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-web-hpa
  namespace: okla
  labels:
    tier: critical
    app.kubernetes.io/part-of: okla
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-web
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 3
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

