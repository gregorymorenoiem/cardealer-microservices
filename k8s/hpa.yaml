---
# LLM Server — CPU-intensive inference (conservative scaling, high memory)
# ⚠️ Each replica loads full GGUF model (~4.7 GB RAM + inference overhead)
# Scale conservatively: memory is the bottleneck, not CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-server-hpa
  namespace: okla
  labels:
    tier: ai-ml
    app.kubernetes.io/part-of: okla-chatbot
  annotations:
    app.okla.com/note: "Conservative scaling — each pod loads 4.7GB model"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-server
  minReplicas: 1
  maxReplicas: 2 # Max 2 — each uses 6-8Gi RAM. Evaluate GPU before scaling >2.
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 300 # 5 min — model loading takes time
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300 # Max 1 new pod every 5 min
    scaleDown:
      stabilizationWindowSeconds: 600 # 10 min — avoid thrashing
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
