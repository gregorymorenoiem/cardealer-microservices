# =============================================================================
# MVP SELF-MANAGED - Ingress
# =============================================================================
# BFF Pattern: Only the frontend is exposed to the internet.
# The Gateway is internal-only — all API traffic flows through Next.js rewrites.
# Internet → okla.com.do → frontend-web → (internal) gateway:8080 → microservices
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: okla-ingress
  namespace: okla
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Security headers — defense-in-depth for the internet-facing frontend
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
    # Rate limiting — protect against DDoS and brute-force
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
spec:
  tls:
    - hosts:
        - okla.com.do
        - www.okla.com.do
      secretName: okla-tls
  rules:
    # Frontend — the ONLY externally accessible service
    - host: okla.com.do
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-web
                port:
                  number: 8080
    - host: www.okla.com.do
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-web
                port:
                  number: 8080
    # NOTE: api.okla.com.do has been REMOVED — Gateway is internal-only (BFF pattern)
    # All API traffic now flows: Browser → okla.com.do/api/* → Next.js rewrite → gateway:8080
