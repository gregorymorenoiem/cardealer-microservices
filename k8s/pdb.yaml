---
# ═══════════════════════════════════════════════════════════════════════════
# 🟠 IMPORTANT — Mantener al menos 1 pod disponible
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: userservice-pdb
  namespace: okla
  labels:
    tier: important
spec:
  maxUnavailable: 1 # maxUnavailable en vez de minAvailable — permite node drains con 1 réplica
