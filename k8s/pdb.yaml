# =============================================================================
# POD DISRUPTION BUDGET (PDB) — Alta Disponibilidad
# =============================================================================
# Garantiza que SIEMPRE haya pods disponibles durante:
#   - Rolling updates (kubectl rollout restart)
#   - Node drains (maintenance, cluster upgrades)
#   - Spot instance reclaims (si se usan nodos spot)
#
# REGLAS:
#   🔴 CRITICAL (minReplicas=2): minAvailable=1 (50% siempre up)
#   🟠 IMPORTANT: minAvailable=1
#   🔵 INTERNAL: maxUnavailable=1 (más flexible)
# =============================================================================

---
# ═══════════════════════════════════════════════════════════════════════════
# 🔴 CRITICAL — Siempre mantener al menos 1 pod (mínimo 2 réplicas)
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-web-pdb
  namespace: okla
  labels:
    tier: critical
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend-web

